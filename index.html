<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTCG 牌組測試工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e8eaf0;--muted:#7a7f9a;
  --accent:#e63b3b;--accent2:#f5a623;
  --blue:#4a90e2;--green:#27ae60;
  --card-w:80px;--card-h:112px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#1a0a0a,#1a1d27);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;}
header h1{font-family:'Zen Maru Gothic',sans-serif;font-size:1.15rem;font-weight:700;color:var(--accent);}
.header-right{margin-left:auto;text-align:right;}
.version{font-size:.6rem;color:var(--muted);}
.db-status{font-size:.63rem;color:var(--green);margin-top:1px;}
.pokeball{width:28px;height:28px;background:conic-gradient(var(--accent) 180deg,#fff 180deg);border-radius:50%;border:2px solid #fff;position:relative;flex-shrink:0;}
.pokeball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:#fff;border:2px solid #333;}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;overflow-x:auto;}
.tab{padding:10px 14px;font-size:.82rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.panel{display:none;padding:18px;max-width:1100px;margin:0 auto;}
.panel.active{display:block;}
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.icard h2{font-size:.85rem;color:var(--muted);margin-bottom:10px;font-weight:500;display:flex;align-items:center;gap:8px;}
textarea{width:100%;height:220px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:monospace;font-size:.76rem;resize:vertical;line-height:1.7;}
textarea:focus{outline:none;border-color:var(--accent);}
.hint{font-size:.68rem;color:var(--muted);margin-top:6px;line-height:1.6;}
.hint b{color:var(--accent2);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;font-size:.82rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:500;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#c0392b;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}.btn-secondary:hover{background:var(--border2);}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{background:#2980b9;}
.btn-sm{padding:5px 10px;font-size:.74rem;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
/* 牌組編碼顯示 */
.deck-code-bar{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.deck-code-label{font-size:.72rem;color:var(--muted);white-space:nowrap;}
.deck-code-val{font-family:monospace;font-size:.95rem;color:var(--accent2);font-weight:700;letter-spacing:1px;flex:1;}
.copy-btn{padding:4px 10px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-size:.7rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.copy-btn:hover{border-color:var(--accent2);color:var(--accent2);}
/* status */
.status-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.76rem;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-p{background:#e74c3c;}.dot-t{background:#3498db;}.dot-e{background:#f39c12;}
.sec-label{font-size:.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.cards-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.ctile{position:relative;width:var(--card-w);cursor:default;transition:transform .15s;}
.ctile:hover{transform:scale(1.08);z-index:10;}
.cimg{width:var(--card-w);height:var(--card-h);object-fit:cover;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);display:block;}
.cimg-err{width:var(--card-w);height:var(--card-h);display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:.52rem;color:var(--muted);text-align:center;padding:4px;border-radius:6px;border:1px solid var(--border2);}
.ccount{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.78);color:#fff;font-size:.67rem;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cname{font-size:.58rem;color:var(--muted);text-align:center;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sim-layout{display:grid;grid-template-columns:1fr 290px;gap:14px;}
@media(max-width:680px){.sim-layout{grid-template-columns:1fr;}}
.hand-area{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;}
.hand-area h3{font-size:.8rem;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.hand-cards{display:flex;flex-wrap:wrap;gap:7px;min-height:120px;align-content:flex-start;}
.side{display:flex;flex-direction:column;gap:10px;}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;}
.info-card h3{font-size:.8rem;color:var(--muted);margin-bottom:8px;}
.deck-counter{font-size:2rem;font-weight:700;color:var(--text);font-family:'Zen Maru Gothic',sans-serif;text-align:center;line-height:1;}
.turn-badge{background:var(--accent);color:#fff;border-radius:20px;padding:3px 12px;font-size:.76rem;font-weight:700;text-align:center;margin-bottom:6px;}
.sup-btn{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:.74rem;color:var(--text);cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;margin-bottom:5px;width:100%;}
.sup-btn:hover{background:var(--border2);border-color:var(--accent);}
.sup-eff{font-size:.67rem;color:var(--muted);}
.n-row{display:flex;gap:6px;align-items:center;margin-top:4px;}
.n-input{width:46px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:4px 7px;color:var(--text);font-size:.76rem;text-align:center;}
.n-input:focus{outline:none;border-color:var(--accent);}
.alert{padding:9px 12px;border-radius:8px;font-size:.78rem;margin-bottom:12px;display:none;}
.alert.show{display:block;}
.alert-warn{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);color:var(--accent2);}
.alert-err{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#e74c3c;}
.alert-ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.3);color:var(--green);}
.prob-table{width:100%;border-collapse:collapse;font-size:.76rem;}
.prob-table th{text-align:left;color:var(--muted);font-weight:500;padding:5px 0;border-bottom:1px solid var(--border);}
.prob-table td{padding:6px 0;border-bottom:1px solid var(--border);vertical-align:middle;}
.pbar-wrap{height:5px;background:var(--bg3);border-radius:3px;width:65px;display:inline-block;vertical-align:middle;margin-left:6px;}
.pbar{height:5px;background:var(--accent);border-radius:3px;}
.spinner{width:24px;height:24px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ctile.sup-glow .cimg{border:2px solid var(--accent2);box-shadow:0 0 8px rgba(245,166,35,.4);}
.ctile.sup-glow .cimg-err{border:2px solid var(--accent2);}
#simLog{font-size:.71rem;color:var(--muted);max-height:170px;overflow-y:auto;line-height:1.9;}
.parse-status{font-size:.76rem;min-height:18px;margin:8px 0 2px;}
.parse-ok{color:var(--green);} .parse-err{color:#e74c3c;}
</style>
</head>
<body>

<header>
  <div class="pokeball"></div>
  <div>
    <h1>PTCG 牌組測試工具</h1>
  </div>
  <div class="header-right">
    <div class="version">v 2026/05/30 02:51:47</div>
    <div class="db-status">✅ 資料庫 1403 種卡牌</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📋 牌組輸入</div>
  <div class="tab" onclick="switchTab('overview')">🃏 牌組總覽</div>
  <div class="tab" onclick="switchTab('sim')">🎮 對戰模擬</div>
  <div class="tab" onclick="switchTab('prob')">📊 機率計算</div>
</div>

<!-- ═══ TAB 1 ═══ -->
<div class="panel active" id="panel-input">
  <div class="icard">
    <h2>📋 貼上官網頁面文字</h2>
    <textarea id="deckInput" placeholder="用 iOS 捷徑或手動全選複製官網牌組頁面，整個貼在這裡即可。工具會自動找出牌組資料，不需要手動清理。"></textarea>
    <div class="hint">
      💡 <b>使用方法：</b>在官網牌組頁面用「捷徑」或長按→全選→複製，把整頁文字貼過來就好，頁首頁尾雜訊會自動過濾。
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-primary" onclick="parsePaste()">✅ 解析</button>
      <button class="btn btn-secondary btn-sm" onclick="loadDemo()">📝 載入範例</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('deckInput').value=''">🗑 清除</button>
    </div>
    <div class="parse-status" id="parseStatus"></div>
  </div>
  <div class="alert alert-err" id="alertErr"></div>
</div>

<!-- ═══ TAB 2 ═══ -->
<div class="panel" id="panel-overview">
  <div id="deckCodeBar" style="display:none;" class="deck-code-bar">
    <span class="deck-code-label">🔖 牌組編碼</span>
    <span class="deck-code-val" id="deckCodeVal">—</span>
    <button class="copy-btn" onclick="copyCode()">複製</button>
  </div>
  <div class="status-bar" id="statusBar"></div>
  <div id="deckOverview"></div>
</div>

<!-- ═══ TAB 3 ═══ -->
<div class="panel" id="panel-sim">
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="drawOpeningHand()">🔀 洗牌 / 起手牌</button>
    <button class="btn btn-blue" onclick="drawOne()">➕ 抽一張</button>
    <button class="btn btn-secondary btn-sm" onclick="resetSim()">↩ 重置</button>
  </div>
  <div class="alert alert-warn" id="alertMulligan"></div>
  <div class="sim-layout">
    <div>
      <div class="hand-area">
        <h3>
          <span>手牌</span>
          <span id="handCount" style="color:var(--text);font-weight:700;">0 張</span>
        </h3>
        <div class="hand-cards" id="handCards"></div>
      </div>
    </div>
    <div class="side">
      <div class="info-card" style="text-align:center;">
        <div class="turn-badge" id="turnBadge">第 0 回合</div>
        <div class="deck-counter" id="deckCounter">--</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:3px;">牌庫剩餘</div>
      </div>
      <div class="info-card" id="supporterPanel" style="display:none;">
        <h3>⚡ 可發動的支援者</h3>
        <div id="supporterActions"></div>
      </div>
      <div class="info-card">
        <h3>📜 回合紀錄</h3>
        <div id="simLog"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ TAB 4 ═══ -->
<div class="panel" id="panel-prob">
  <div class="icard">
    <h2>📊 起手牌機率（超幾何分佈，起手 7 張）</h2>
    <table class="prob-table">
      <thead>
        <tr><th>卡牌名稱</th><th>張數</th><th>至少 1 張</th><th>至少 2 張</th></tr>
      </thead>
      <tbody id="probBody"></tbody>
    </table>
  </div>
</div>

// ═══ 解析（支援官網全頁複製格式）═══
function parsePaste(){
  const raw = document.getElementById('deckInput').value;
  if(!raw.trim()){ showErr('請先貼上內容'); return; }
  hideErr();

  const lines = raw.split('\n');

  // ── Step 1：找牌組資料起始行（第一個分類標題）──
  const SECTION_PAT = /^(寶可夢卡|寶可夢道具|物品卡|支援者卡|競技場卡|能量卡|訓練師卡)[（(]\d+[)）]/;
  let startIdx = -1;
  for(let i=0;i<lines.length;i++){
    if(SECTION_PAT.test(lines[i].trim())){ startIdx=i; break; }
  }
  if(startIdx<0){ showErr('❌ 找不到牌組資料，請確認已複製到含分類標題的完整頁面文字'); return; }

  // ── Step 2：找牌組資料結束行 ──
  const END_MARKERS = ['以此牌組為基礎','牌組編碼','列印牌組','\nTOP','Contact','Site Map','Term of Use'];
  let endIdx = lines.length;
  for(let i=startIdx+1;i<lines.length;i++){
    if(END_MARKERS.some(m=>lines[i].includes(m))){ endIdx=i; break; }
  }

  // ── Step 3：抓牌組編碼（在結束行後面找）──
  currentDeckCode = '';
  for(let i=endIdx;i<Math.min(endIdx+10,lines.length);i++){
    const m = lines[i].match(/([A-Za-z0-9]{6}-[A-Za-z0-9]{6}-[A-Za-z0-9]{6})/);
    if(m){ currentDeckCode=m[1]; break; }
  }

  // ── Step 4：解析牌組行 ──
  const deckLines = lines.slice(startIdx,endIdx).map(l=>l.trim()).filter(l=>l);
  deckList = [];
  let i=0;
  while(i<deckLines.length){
    const line = deckLines[i];
    if(SECTION_PAT.test(line)){ i++; continue; }
    if(i+2<deckLines.length){
      const nameLine  = deckLines[i];
      const codeLine  = deckLines[i+1];
      const countLine = deckLines[i+2];
      const isCode  = /^[A-Za-z][A-Za-z0-9\-]*\s+[\w\-\/]+/.test(codeLine);
      const isCount = /^\d{1,2}$/.test(countLine);
      if(isCode && isCount){
        const info = findCard(nameLine);
        deckList.push({
          name:     nameLine,
          count:    parseInt(countLine),
          cardType: info?.cardType||'未知',
          imageUrl: info?.imageUrl||'',
          found:    !!info,
        });
        i+=3; continue;
      }
    }
    i++;
  }

  if(!deckList.length){ showErr('❌ 解析失敗，請重新複製官網頁面全文再試'); return; }

  const total = deckList.reduce((s,c)=>s+c.count,0);
  const notFound = deckList.filter(c=>!c.found);
  let msg = `✅ 解析完成：${deckList.length} 種，共 ${total} 張`;
  if(currentDeckCode) msg += `　編碼：${currentDeckCode}`;
  if(notFound.length) msg += `　⚠ ${notFound.length} 種未識別`;
  setStatus(msg,'ok');

  buildOverview();
  buildProbTable();
  resetSim();
  switchTab('overview');
}

function findCard(name){
  if(cardMap.has(name)) return cardMap.get(name);
  for(const [k,v] of cardMap){
    if(k.includes(name)||name.includes(k)) return v;
  }
  return null;
}

// ═══ 牌組總覽 ═══
const POKE_T   = new Set(['基礎','1階進化','2階進化']);
const TRAIN_T  = new Set(['物品卡','支援者卡','競技場卡','寶可夢道具']);
const ENERGY_T = new Set(['基本能量卡','特殊能量卡']);

function buildOverview(){
  const poke   = deckList.filter(c=>POKE_T.has(c.cardType));
  const trainer= deckList.filter(c=>TRAIN_T.has(c.cardType));
  const energy = deckList.filter(c=>ENERGY_T.has(c.cardType));
  const other  = deckList.filter(c=>!POKE_T.has(c.cardType)&&!TRAIN_T.has(c.cardType)&&!ENERGY_T.has(c.cardType));
  const total  = deckList.reduce((s,c)=>s+c.count,0);

  // 牌組編碼 bar
  const codeBar = document.getElementById('deckCodeBar');
  if(currentDeckCode){
    document.getElementById('deckCodeVal').textContent = currentDeckCode;
    codeBar.style.display='flex';
  } else {
    codeBar.style.display='none';
  }

  document.getElementById('statusBar').innerHTML = `
    <div class="stat-pill"><div class="dot dot-p"></div>寶可夢 ${sum(poke)} 張</div>
    <div class="stat-pill"><div class="dot dot-t"></div>訓練師 ${sum(trainer)} 張</div>
    <div class="stat-pill"><div class="dot dot-e"></div>能量 ${sum(energy)} 張</div>
    <div class="stat-pill">總計 ${total} 張</div>
    ${deckList.some(c=>!c.found)?'<div class="stat-pill" style="color:#e74c3c;">⚠ 部分未識別</div>':''}
  `;

  let html='';
  if(poke.length)   html+=mkSection('🔴 寶可夢',poke);
  if(trainer.length)html+=mkSection('🔵 訓練師',trainer);
  if(energy.length) html+=mkSection('🟡 能量',energy);
  if(other.length)  html+=mkSection('⚪ 其他',other);
  document.getElementById('deckOverview').innerHTML=html;
}

function sum(arr){return arr.reduce((s,c)=>s+c.count,0);}
function mkSection(label,cards){
  return `<div class="sec-label">${label}（${sum(cards)} 張）</div>
    <div class="cards-grid">${cards.map(cardTile).join('')}</div>`;
}
function cardTile(c){
  const hasImg=!!c.imageUrl;
  const img=hasImg?`<img class="cimg" src="${c.imageUrl}" alt="${esc(c.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
  const err=`<div class="cimg-err" ${hasImg?'style="display:none"':''}>${esc(c.name)}</div>`;
  return `<div class="ctile"><div style="position:relative">${img}${err}<div class="ccount">${c.count}</div></div>
    <div class="cname">${esc(c.name)}</div></div>`;
}

function copyCode(){
  if(!currentDeckCode) return;
  navigator.clipboard.writeText(currentDeckCode).then(()=>{
    const btn=document.querySelector('.copy-btn');
    btn.textContent='✅ 已複製';
    setTimeout(()=>btn.textContent='複製',1500);
  }).catch(()=>{
    // iOS fallback
    const el=document.createElement('textarea');
    el.value=currentDeckCode;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const btn=document.querySelector('.copy-btn');
    btn.textContent='✅ 已複製';
    setTimeout(()=>btn.textContent='複製',1500);
  });
}

// ═══ 模擬 ═══
function buildDrawPile(){
  drawPile=[];
  deckList.forEach(c=>{for(let i=0;i<c.count;i++) drawPile.push({...c});});
  shuffle(drawPile);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function drawOpeningHand(){
  buildDrawPile(); hand=[]; turn=0;
  for(let i=0;i<7&&drawPile.length;i++) hand.push(drawPile.pop());
  addLog('🔀 洗牌完成，抽起手牌 7 張');
  const hasBasic=hand.some(c=>c.cardType==='基礎');
  if(!hasBasic){
    setAlert('alertMulligan','⚠️ 起手牌沒有基礎寶可夢！需要 Mulligan（洗牌重抽）','show');
    addLog('⚠️ 無基礎寶可夢，需 Mulligan');
  }else{clearAlert('alertMulligan');}
  updateSim();
}

function drawOne(){
  if(!drawPile.length){addLog('❌ 牌庫已空！');return;}
  turn++;
  const card=drawPile.pop();
  hand.push(card);
  addLog(`第 ${turn} 回合：抽到【${card.name}】`);
  updateSim();
}

function reshuffleAndDraw(n,label){
  hand.forEach(c=>drawPile.push(c));
  shuffle(drawPile);
  hand=[];
  for(let i=0;i<n&&drawPile.length;i++) hand.push(drawPile.pop());
  addLog(`⚡ 發動【${label}】：洗回手牌，重新抽 ${n} 張`);
  updateSim();
}

function resetSim(){
  drawPile=[]; hand=[]; turn=0;
  document.getElementById('handCards').innerHTML='<span style="color:var(--muted);font-size:.76rem">按「洗牌」開始</span>';
  document.getElementById('handCount').textContent='0 張';
  document.getElementById('deckCounter').textContent=deckList.reduce((s,c)=>s+c.count,0)||'--';
  document.getElementById('turnBadge').textContent='第 0 回合';
  document.getElementById('simLog').innerHTML='';
  document.getElementById('supporterPanel').style.display='none';
  clearAlert('alertMulligan');
}

function updateSim(){
  const hc=document.getElementById('handCards');
  hc.innerHTML=hand.length?hand.map(c=>{
    const isSup=!!SPECIAL_SUP[c.name];
    const hasImg=!!c.imageUrl;
    const img=hasImg?`<img class="cimg" src="${c.imageUrl}" alt="${esc(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
    const err=`<div class="cimg-err" ${hasImg?'style="display:none"':''}>${esc(c.name)}</div>`;
    return `<div class="ctile ${isSup?'sup-glow':''}"><div style="position:relative">${img}${err}</div><div class="cname">${esc(c.name)}</div></div>`;
  }).join(''):'<span style="color:var(--muted);font-size:.76rem">手牌為空</span>';

  document.getElementById('handCount').textContent=hand.length+' 張';
  document.getElementById('deckCounter').textContent=drawPile.length;
  document.getElementById('turnBadge').textContent=turn===0?'起手牌':`第 ${turn} 回合`;

  const activeSups=[...new Set(hand.filter(c=>SPECIAL_SUP[c.name]).map(c=>c.name))];
  if(activeSups.length){
    document.getElementById('supporterPanel').style.display='block';
    document.getElementById('supporterActions').innerHTML=activeSups.map(name=>{
      const s=SPECIAL_SUP[name];
      if(s.needsN) return `<div class="sup-btn" style="flex-direction:column;align-items:flex-start;gap:3px;">
        <div>${s.label}</div><div class="sup-eff">${s.eff}</div>
        <div class="n-row"><input type="number" class="n-input" id="nVal_${name}" value="4" min="1" max="10">
        <button class="btn btn-sm btn-secondary" onclick="activateSup('${name}')">發動</button></div></div>`;
      return `<button class="sup-btn" onclick="activateSup('${name}')">
        <div><div>${s.label}</div><div class="sup-eff">${s.eff}</div></div>
        <span style="color:var(--accent)">▶</span></button>`;
    }).join('');
  }else{document.getElementById('supporterPanel').style.display='none';}
}

function activateSup(name){
  const s=SPECIAL_SUP[name];
  const idx=hand.findIndex(c=>c.name===name);
  if(idx!==-1) hand.splice(idx,1);
  if(s.needsN){
    const n=parseInt(document.getElementById('nVal_'+name)?.value||4)||4;
    reshuffleAndDraw(n,'N 的謀劃');
  }else{s.fn();}
}

function addLog(msg){
  const el=document.getElementById('simLog');
  el.innerHTML+=`<div>${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

// ═══ 機率 ═══
function buildProbTable(){
  const N=deckList.reduce((s,c)=>s+c.count,0);
  document.getElementById('probBody').innerHTML=deckList.map(c=>{
    const p1=(hyperAtLeast(N,c.count,7,1)*100).toFixed(1);
    const p2=c.count>=2?(hyperAtLeast(N,c.count,7,2)*100).toFixed(1):null;
    return `<tr><td>${esc(c.name)}</td><td style="color:var(--muted)">${c.count}</td>
      <td>${p1}%<span class="pbar-wrap"><span class="pbar" style="width:${p1}%"></span></span></td>
      <td>${p2!==null?p2+'%':'-'}</td></tr>`;
  }).join('');
}
function hyperAtLeast(N,K,n,k){let p=0;for(let i=0;i<k;i++)p+=hyperExact(N,K,n,i);return Math.max(0,Math.min(1,1-p));}
function hyperExact(N,K,n,k){return comb(K,k)*comb(N-K,n-k)/comb(N,n);}
function comb(n,k){if(k<0||k>n)return 0;if(k===0||k===n)return 1;k=Math.min(k,n-k);let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return r;}

// ═══ UI ═══
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}
function showErr(msg){const el=document.getElementById('alertErr');el.textContent=msg;el.className='alert alert-err show';}
function hideErr(){document.getElementById('alertErr').className='alert alert-err';}
function setStatus(msg,cls){const el=document.getElementById('parseStatus');el.textContent=msg;el.className='parse-status parse-'+(cls||'ok');}
function setAlert(id,msg,cls){const el=document.getElementById(id);el.textContent=msg;el.className=`alert alert-warn ${cls}`;}
function clearAlert(id){document.getElementById(id).className='alert alert-warn';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
