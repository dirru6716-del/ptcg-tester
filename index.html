<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTCG 牌組測試工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8eaf0;
  --muted: #7a7f9a;
  --accent: #e63b3b;
  --accent2: #f5a623;
  --blue: #4a90e2;
  --green: #27ae60;
  --purple: #8e44ad;
  --card-w: 80px;
  --card-h: 112px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
/* ── HEADER ── */
header {
  background: linear-gradient(135deg, #1a0a0a 0%, #1a1d27 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}
header .subtitle { font-size: 0.75rem; color: var(--muted); }
.pokeball {
  width: 32px; height: 32px;
  background: conic-gradient(var(--accent) 180deg, #fff 180deg);
  border-radius: 50%;
  border: 2px solid #fff;
  position: relative;
  flex-shrink: 0;
}
.pokeball::after {
  content:'';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:10px; height:10px;
  border-radius:50%;
  background:#fff;
  border:2px solid #333;
}
/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.tab {
  padding: 12px 20px;
  font-size: 0.85rem;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }
/* ── PANELS ── */
.panel { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
.panel.active { display: block; }
/* ── INPUT AREA ── */
.input-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}
.input-card h2 { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
textarea {
  width: 100%;
  height: 220px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px;
  color: var(--text);
  font-family: monospace;
  font-size: 0.82rem;
  resize: vertical;
  line-height: 1.6;
}
textarea:focus { outline: none; border-color: var(--accent); }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 0.85rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #c0392b; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--border2); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: #2980b9; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #219a52; }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
/* ── STATUS BAR ── */
.status-bar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.stat-pill {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-pill .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.dot-pokemon { background: #e74c3c; }
.dot-trainer { background: #3498db; }
.dot-energy  { background: #f39c12; }
/* ── DECK GRID ── */
.section-label {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.cards-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.card-item {
  position: relative;
  width: var(--card-w);
  cursor: default;
  transition: transform 0.15s;
}
.card-item:hover { transform: scale(1.08); z-index: 10; }
.card-img {
  width: var(--card-w);
  height: var(--card-h);
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg3);
}
.card-img.error {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg3);
  font-size: 0.6rem;
  color: var(--muted);
  text-align: center;
  padding: 4px;
}
.card-count {
  position: absolute;
  top: 4px; right: 4px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-name {
  font-size: 0.62rem;
  color: var(--muted);
  text-align: center;
  margin-top: 3px;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* ── SIMULATION ── */
.sim-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}
@media (max-width: 768px) {
  .sim-layout { grid-template-columns: 1fr; }
}
.hand-area {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.hand-area h3 {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hand-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 130px;
}
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.info-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.info-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
.deck-counter {
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  text-align: center;
  line-height: 1;
}
.deck-counter small { font-size: 0.8rem; color: var(--muted); display: block; margin-top: 4px; }
.turn-badge {
  background: var(--accent);
  color: #fff;
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.8rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
}
/* ── SUPPORTER ACTIONS ── */
.supporter-actions { display: flex; flex-direction: column; gap: 6px; }
.supporter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.78rem;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans TC', sans-serif;
}
.supporter-btn:hover { background: var(--border2); border-color: var(--accent); }
.supporter-btn .effect { font-size: 0.7rem; color: var(--muted); }
.n-input {
  display: flex;
  gap: 6px;
  align-items: center;
}
.n-input input {
  width: 50px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--text);
  font-size: 0.8rem;
  text-align: center;
}
.n-input input:focus { outline: none; border-color: var(--accent); }
/* ── ALERT ── */
.alert {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.82rem;
  margin-bottom: 16px;
  display: none;
}
.alert.show { display: block; }
.alert-warning { background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3); color: var(--accent2); }
.alert-success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3); color: var(--green); }
.alert-error   { background: rgba(231,76,60,0.15);  border: 1px solid rgba(231,76,60,0.3);  color: #e74c3c; }
/* ── PROBABILITY ── */
.prob-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.prob-table th {
  text-align: left;
  color: var(--muted);
  font-weight: 500;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.prob-table td { padding: 8px 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
.prob-bar-wrap { height: 6px; background: var(--bg3); border-radius: 3px; width: 80px; display: inline-block; vertical-align: middle; margin-left: 8px; }
.prob-bar { height: 6px; background: var(--accent); border-radius: 3px; transition: width 0.4s; }
/* ── LOADING ── */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 0.85rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* ── HAND CARD HIGHLIGHT ── */
.card-item.in-hand { --card-h: 112px; }
.card-item.supporter-active .card-img {
  border: 2px solid var(--accent2);
  box-shadow: 0 0 8px rgba(245,166,35,0.4);
}
/* ── MULIGAN notice ── */
.mulligan-notice {
  background: rgba(231,76,60,0.12);
  border: 1px solid rgba(231,76,60,0.25);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.78rem;
  color: #e74c3c;
  margin-top: 8px;
  display: none;
}
.mulligan-notice.show { display: block; }
/* ── TOOLTIP ── */
.tooltip-wrap { position: relative; }
.tooltip-wrap:hover .tooltip-box { display: block; }
.tooltip-box {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.72rem;
  color: var(--text);
  width: 160px;
  z-index: 100;
  line-height: 1.5;
  pointer-events: none;
}
.tooltip-box .tname { font-weight: 700; color: var(--accent2); margin-bottom: 2px; }
.tooltip-box .ttype { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="pokeball"></div>
  <div>
    <h1>PTCG 牌組測試工具</h1>
    <div class="subtitle">貼上官網牌組清單，開始模擬</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📋 牌組輸入</div>
  <div class="tab" onclick="switchTab('overview')" id="tab-overview">🃏 牌組總覽</div>
  <div class="tab" onclick="switchTab('sim')" id="tab-sim">🎮 對戰模擬</div>
  <div class="tab" onclick="switchTab('prob')" id="tab-prob">📊 機率計算</div>
</div>

<!-- ════════════════ TAB 1: 輸入 ════════════════ -->

<div class="panel active" id="panel-input">
  <div class="input-card">
    <h2>📋 從官網複製牌組清單，貼到下方</h2>
    <textarea id="deckInput" placeholder="寶可夢卡(22)

火狐狸
M4 011/083
04
長尾火狐
M4 012/083
03
…”></textarea>
<div style="margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
<button class="btn btn-primary" onclick="parseDeck()">✅ 解析牌組</button>
<button class="btn btn-secondary" onclick="clearAll()">🗑 清除</button>
<span id="parseStatus" style="font-size:0.8rem; color:var(--muted);"></span>
</div>

  </div>
  <div class="alert alert-error" id="alertError"></div>
  <div id="loadingDB" class="loading" style="display:none">
    <div class="spinner"></div>
    正在載入卡牌資料庫...
  </div>
</div>

<!-- ════════════════ TAB 2: 總覽 ════════════════ -->

<div class="panel" id="panel-overview">
  <div class="status-bar" id="statusBar"></div>
  <div id="deckOverview"></div>
</div>

<!-- ════════════════ TAB 3: 模擬 ════════════════ -->

<div class="panel" id="panel-sim">
  <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="drawOpeningHand()">🔀 重新洗牌 / 起手牌</button>
    <button class="btn btn-blue" onclick="drawOne()" id="btnDraw">➕ 抽一張</button>
    <button class="btn btn-secondary btn-sm" onclick="resetSim()">↩ 重置</button>
  </div>
  <div class="alert alert-warning" id="alertMulligan"></div>
  <div class="sim-layout">
    <div>
      <div class="hand-area">
        <h3>
          <span>手牌</span>
          <span id="handCount" style="color:var(--text); font-weight:700;">0 張</span>
        </h3>
        <div class="hand-cards" id="handCards"></div>
      </div>
    </div>
    <div class="side-panel">
      <div class="info-card" style="text-align:center;">
        <div class="turn-badge" id="turnBadge">第 0 回合</div>
        <div class="deck-counter" id="deckCounter">--</div>
        <small style="color:var(--muted); font-size:0.75rem;">牌庫剩餘</small>
      </div>
      <div class="info-card" id="supporterPanel" style="display:none;">
        <h3>⚡ 可發動的支援者</h3>
        <div class="supporter-actions" id="supporterActions"></div>
      </div>
      <div class="info-card">
        <h3>📜 回合紀錄</h3>
        <div id="simLog" style="font-size:0.75rem; color:var(--muted); max-height:200px; overflow-y:auto; line-height:1.8;"></div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════ TAB 4: 機率 ════════════════ -->

<div class="panel" id="panel-prob">
  <div class="input-card">
    <h2>📊 起手牌機率計算（超幾何分佈）</h2>
    <p style="font-size:0.8rem; color:var(--muted); margin-bottom:16px;">計算起手 7 張中，抽到指定張數以上的機率</p>
    <table class="prob-table" id="probTable">
      <thead>
        <tr>
          <th>卡牌名稱</th>
          <th>牌組張數</th>
          <th>至少抽到 1 張</th>
          <th>至少抽到 2 張</th>
        </tr>
      </thead>
      <tbody id="probBody"></tbody>
    </table>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// 全域狀態
// ══════════════════════════════════════════
const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/129Qa5N3BwHoTuTh8WeKAdg3BFlNITt4I47b8WQOMyAc/gviz/tq?tqx=out:csv';

let cardDB = [];       // 全部卡牌資料庫
let deckList = [];     // [{name, count, cardType, imageUrl, ...}]
let drawPile = [];     // 洗好的牌庫（含重複）
let hand = [];         // 手牌
let turn = 0;
let dbLoaded = false;

// 特殊支援者效果定義
const SPECIAL_SUPPORTERS = {
  '莉莉艾的決意': { label: '莉莉艾的決意', effect: '手牌洗回牌庫，重新抽 6 張', action: (n) => reshuffleAndDraw(6) },
  '裁判':         { label: '裁判',           effect: '手牌洗回牌庫，重新抽 4 張', action: (n) => reshuffleAndDraw(4) },
  'N的謀劃':      { label: 'N 的謀劃',       effect: '手牌洗回牌庫，重新抽 N 張', action: (n) => reshuffleAndDraw(parseInt(n)||4), needsN: true },
};

// ══════════════════════════════════════════
// 載入卡牌資料庫
// ══════════════════════════════════════════
async function loadCardDB() {
  if (dbLoaded) return true;
  document.getElementById('loadingDB').style.display = 'block';
  try {
    const res = await fetch(SHEETS_URL);
    if (!res.ok) throw new Error('無法讀取 Google Sheets');
    const text = await res.text();
    cardDB = parseCSV(text);
    dbLoaded = true;
    document.getElementById('loadingDB').style.display = 'none';
    return true;
  } catch(e) {
    document.getElementById('loadingDB').style.display = 'none';
    showError('❌ 無法載入卡牌資料庫：' + e.message);
    return false;
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = splitCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim()] = (vals[idx] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

// ══════════════════════════════════════════
// 解析牌組清單
// ══════════════════════════════════════════
async function parseDeck() {
  const raw = document.getElementById('deckInput').value.trim();
  if (!raw) { showError('請先貼上牌組清單'); return; }

  const ok = await loadCardDB();
  if (!ok) return;

  hideError();
  deckList = [];

  const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // 跳過分類標題行
    if (/^(寶可夢|訓練師|物品|支援者|競技場|能量|道具)/.test(line) && /[\(（]/.test(line)) {
      i++; continue;
    }

    // 嘗試解析一組三行：卡名 / 編號 / 張數
    if (i + 2 < lines.length) {
      const nameLine  = lines[i];
      const codeLine  = lines[i+1];
      const countLine = lines[i+2];

      const isCode  = /^[A-Za-z0-9\-]+\s+[\w\-\/]+/.test(codeLine);
      const isCount = /^\d{1,2}$/.test(countLine);

      if (isCode && isCount) {
        const count = parseInt(countLine);
        const cardInfo = findCard(nameLine);
        deckList.push({
          name:     nameLine,
          count:    count,
          cardType: cardInfo ? cardInfo.card_type : '未知',
          imageUrl: cardInfo ? cardInfo.image_url : '',
          hp:       cardInfo ? cardInfo.hp : '',
          setName:  cardInfo ? cardInfo.set_name : '',
          found:    !!cardInfo,
        });
        i += 3;
        continue;
      }
    }
    i++;
  }

  if (deckList.length === 0) {
    showError('❌ 無法解析牌組，請確認格式是否正確');
    return;
  }

  const total = deckList.reduce((s, c) => s + c.count, 0);
  document.getElementById('parseStatus').textContent = `✅ 解析完成：${deckList.length} 種卡牌，共 ${total} 張`;

  buildOverview();
  buildProbTable();
  resetSim();

  // 自動切換到總覽
  switchTab('overview');
}

function findCard(name) {
  // 完全符合
  let found = cardDB.find(c => c.name === name);
  if (found) return found;
  // 去頭去尾空白後比對
  found = cardDB.find(c => c.name.trim() === name.trim());
  if (found) return found;
  // 包含比對
  found = cardDB.find(c => c.name.includes(name) || name.includes(c.name));
  return found || null;
}

// ══════════════════════════════════════════
// 牌組總覽
// ══════════════════════════════════════════
function buildOverview() {
  const pokemon  = deckList.filter(c => ['基礎','1階進化','2階進化'].includes(c.cardType));
  const trainer  = deckList.filter(c => ['物品卡','支援者卡','競技場卡','寶可夢道具'].includes(c.cardType));
  const energy   = deckList.filter(c => ['基本能量卡','特殊能量卡'].includes(c.cardType));
  const unknown  = deckList.filter(c => c.cardType === '未知');

  const total = deckList.reduce((s,c)=>s+c.count,0);
  const pCount = pokemon.reduce((s,c)=>s+c.count,0);
  const tCount = trainer.reduce((s,c)=>s+c.count,0);
  const eCount = energy.reduce((s,c)=>s+c.count,0);

  // 狀態列
  document.getElementById('statusBar').innerHTML = `
    <div class="stat-pill"><div class="dot dot-pokemon"></div>寶可夢 ${pCount} 張</div>
    <div class="stat-pill"><div class="dot dot-trainer"></div>訓練師 ${tCount} 張</div>
    <div class="stat-pill"><div class="dot dot-energy"></div>能量 ${eCount} 張</div>
    <div class="stat-pill">總計 ${total} 張</div>
    ${unknown.length ? `<div class="stat-pill" style="color:#e74c3c;">⚠ 未識別 ${unknown.length} 種</div>` : ''}
  `;

  let html = '';
  if (pokemon.length)  html += buildSection('🔴 寶可夢', pokemon);
  if (trainer.length)  html += buildSection('🔵 訓練師', trainer);
  if (energy.length)   html += buildSection('🟡 能量', energy);
  if (unknown.length)  html += buildSection('⚪ 未識別', unknown);

  document.getElementById('deckOverview').innerHTML = html;
}

function buildSection(label, cards) {
  const count = cards.reduce((s,c)=>s+c.count,0);
  let cardsHtml = cards.map(c => cardTile(c)).join('');
  return `
    <div class="section-label">${label}（${count} 張）</div>
    <div class="cards-grid">${cardsHtml}</div>
  `;
}

function cardTile(c) {
  const imgHtml = c.imageUrl
    ? `<img class="card-img" src="${c.imageUrl}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="card-img error" style="display:none;">${c.name}</div>`
    : `<div class="card-img error" style="display:flex;">${c.name}</div>`;
  return `
    <div class="card-item tooltip-wrap">
      <div style="position:relative;">
        ${imgHtml}
        <div class="card-count">${c.count}</div>
      </div>
      <div class="card-name">${c.name}</div>
      <div class="tooltip-box">
        <div class="tname">${c.name}</div>
        <div class="ttype">${c.cardType}${c.hp ? ' · HP ' + c.hp : ''}</div>
        <div class="ttype">${c.setName}</div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
// 模擬邏輯
// ══════════════════════════════════════════
function buildDrawPile() {
  drawPile = [];
  deckList.forEach(c => {
    for (let i = 0; i < c.count; i++) drawPile.push({...c});
  });
  shuffle(drawPile);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function drawOpeningHand() {
  buildDrawPile();
  hand = [];
  turn = 0;
  for (let i = 0; i < 7 && drawPile.length; i++) hand.push(drawPile.pop());

  addLog('🔀 洗牌完成，抽起手牌 7 張');

  // 判斷有無基礎寶可夢
  const hasBasic = hand.some(c => c.cardType === '基礎');
  if (!hasBasic) {
    document.getElementById('alertMulligan').className = 'alert alert-warning show';
    document.getElementById('alertMulligan').textContent = '⚠️ 起手牌沒有基礎寶可夢！需要 Mulligan（洗牌重抽）';
    addLog('⚠️ 無基礎寶可夢，需 Mulligan');
  } else {
    document.getElementById('alertMulligan').className = 'alert';
  }

  updateSimUI();
}

function drawOne() {
  if (drawPile.length === 0) { addLog('❌ 牌庫已空！'); return; }
  turn++;
  const card = drawPile.pop();
  hand.push(card);
  addLog(`第 ${turn} 回合：抽到【${card.name}】`);
  updateSimUI();
}

function reshuffleAndDraw(n, cardName) {
  // 把手牌洗回牌庫
  hand.forEach(c => drawPile.push(c));
  shuffle(drawPile);
  hand = [];
  for (let i = 0; i < n && drawPile.length; i++) hand.push(drawPile.pop());
  addLog(`⚡ 發動${cardName || ''}：洗回手牌，重新抽 ${n} 張`);
  updateSimUI();
}

function resetSim() {
  drawPile = []; hand = []; turn = 0;
  document.getElementById('handCards').innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">按「重新洗牌」開始</span>';
  document.getElementById('handCount').textContent = '0 張';
  document.getElementById('deckCounter').textContent = deckList.reduce((s,c)=>s+c.count,0) || '--';
  document.getElementById('turnBadge').textContent = '第 0 回合';
  document.getElementById('simLog').innerHTML = '';
  document.getElementById('supporterPanel').style.display = 'none';
  document.getElementById('alertMulligan').className = 'alert';
}

function updateSimUI() {
  // 手牌區
  const hc = document.getElementById('handCards');
  if (hand.length === 0) {
    hc.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">手牌為空</span>';
  } else {
    hc.innerHTML = hand.map(c => {
      const isSupporter = Object.keys(SPECIAL_SUPPORTERS).includes(c.name);
      const imgHtml = c.imageUrl
        ? `<img class="card-img" src="${c.imageUrl}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="card-img error" style="display:none;">${c.name}</div>`
        : `<div class="card-img error" style="display:flex;">${c.name}</div>`;
      return `
        <div class="card-item ${isSupporter ? 'supporter-active' : ''}">
          <div style="position:relative;">${imgHtml}</div>
          <div class="card-name">${c.name}</div>
        </div>`;
    }).join('');
  }

  document.getElementById('handCount').textContent = hand.length + ' 張';
  document.getElementById('deckCounter').textContent = drawPile.length;
  document.getElementById('turnBadge').textContent = turn === 0 ? '起手牌' : `第 ${turn} 回合`;

  // 支援者按鈕
  const supporters = hand.filter(c => SPECIAL_SUPPORTERS[c.name]);
  const uniqueSup = [...new Set(supporters.map(c => c.name))];

  if (uniqueSup.length > 0) {
    document.getElementById('supporterPanel').style.display = 'block';
    document.getElementById('supporterActions').innerHTML = uniqueSup.map(name => {
      const s = SPECIAL_SUPPORTERS[name];
      if (s.needsN) {
        return `<div class="supporter-btn" style="flex-direction:column; align-items:flex-start; gap:4px;">
          <span>${s.label}</span>
          <span class="effect">${s.effect}</span>
          <div class="n-input" style="margin-top:4px;">
            <input type="number" id="nVal_${name}" value="4" min="1" max="10">
            <button class="btn btn-sm btn-secondary" onclick="activateSupporter('${name}')">發動</button>
          </div>
        </div>`;
      }
      return `<button class="supporter-btn" onclick="activateSupporter('${name}')">
        <div>
          <div>${s.label}</div>
          <div class="effect">${s.effect}</div>
        </div>
        <span style="color:var(--accent);">▶</span>
      </button>`;
    }).join('');
  } else {
    document.getElementById('supporterPanel').style.display = 'none';
  }
}

function activateSupporter(name) {
  const s = SPECIAL_SUPPORTERS[name];
  // 從手牌移除一張該支援者
  const idx = hand.findIndex(c => c.name === name);
  if (idx !== -1) hand.splice(idx, 1);

  if (s.needsN) {
    const nInput = document.getElementById('nVal_' + name);
    const n = parseInt(nInput ? nInput.value : 4) || 4;
    reshuffleAndDraw(n, s.label);
  } else {
    s.action();
    addLog(`⚡ 發動【${s.label}】：${s.effect}`);
    updateSimUI();
  }
}

function addLog(msg) {
  const log = document.getElementById('simLog');
  log.innerHTML += `<div>${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

// ══════════════════════════════════════════
// 機率計算（超幾何分佈）
// ══════════════════════════════════════════
function buildProbTable() {
  const total = deckList.reduce((s,c)=>s+c.count,0);
  const handSize = 7;

  const body = document.getElementById('probBody');
  body.innerHTML = deckList.map(c => {
    const p1 = hypergeomAtLeast(total, c.count, handSize, 1) * 100;
    const p2 = c.count >= 2 ? hypergeomAtLeast(total, c.count, handSize, 2) * 100 : null;
    return `<tr>
      <td>${c.name}</td>
      <td style="color:var(--muted);">${c.count}</td>
      <td>
        ${p1.toFixed(1)}%
        <span class="prob-bar-wrap"><span class="prob-bar" style="width:${p1}%"></span></span>
      </td>
      <td>${p2 !== null ? p2.toFixed(1) + '%' : '-'}</td>
    </tr>`;
  }).join('');
}

function hypergeomAtLeast(N, K, n, k) {
  // P(X >= k) = 1 - P(X < k)
  let prob = 0;
  for (let i = 0; i < k; i++) {
    prob += hypergeomExact(N, K, n, i);
  }
  return Math.max(0, Math.min(1, 1 - prob));
}

function hypergeomExact(N, K, n, k) {
  return comb(K, k) * comb(N - K, n - k) / comb(N, n);
}

function comb(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  k = Math.min(k, n - k);
  let result = 1;
  for (let i = 0; i < k; i++) {
    result = result * (n - i) / (i + 1);
  }
  return result;
}

// ══════════════════════════════════════════
// UI 工具
// ══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function showError(msg) {
  const el = document.getElementById('alertError');
  el.textContent = msg;
  el.className = 'alert alert-error show';
}

function hideError() {
  document.getElementById('alertError').className = 'alert';
}

function clearAll() {
  document.getElementById('deckInput').value = '';
  document.getElementById('parseStatus').textContent = '';
  hideError();
  deckList = [];
}
