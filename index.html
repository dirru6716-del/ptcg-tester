<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTCG 牌組測試工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e8eaf0;--muted:#7a7f9a;
  --accent:#e63b3b;--accent2:#f5a623;
  --blue:#4a90e2;--green:#27ae60;
  --card-w:80px;--card-h:112px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#1a0a0a,#1a1d27);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
header h1{font-family:'Zen Maru Gothic',sans-serif;font-size:1.2rem;font-weight:700;color:var(--accent);}
header .sub{font-size:.72rem;color:var(--muted);}
.pokeball{width:30px;height:30px;background:conic-gradient(var(--accent) 180deg,#fff 180deg);border-radius:50%;border:2px solid #fff;position:relative;flex-shrink:0;}
.pokeball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #333;}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
.tab{padding:11px 16px;font-size:.82rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.panel{display:none;padding:20px;max-width:1100px;margin:0 auto;}
.panel.active{display:block;}
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
.icard h2{font-size:.85rem;color:var(--muted);margin-bottom:12px;font-weight:500;}
.code-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.code-input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.9rem;font-family:'Noto Sans TC',sans-serif;}
.code-input:focus{outline:none;border-color:var(--accent);}
.code-input::placeholder{color:var(--muted);}
textarea{width:100%;height:180px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:12px;color:var(--text);font-family:monospace;font-size:.8rem;resize:vertical;line-height:1.6;}
textarea:focus{outline:none;border-color:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;font-size:.83rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:500;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#c0392b;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}.btn-secondary:hover{background:var(--border2);}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{background:#2980b9;}
.btn-sm{padding:6px 12px;font-size:.76rem;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.status-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.78rem;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-p{background:#e74c3c;}.dot-t{background:#3498db;}.dot-e{background:#f39c12;}
.sec-label{font-size:.72rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.cards-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.ctile{position:relative;width:var(--card-w);cursor:default;transition:transform .15s;}
.ctile:hover{transform:scale(1.08);z-index:10;}
.cimg{width:var(--card-w);height:var(--card-h);object-fit:cover;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);}
.cimg-err{width:var(--card-w);height:var(--card-h);display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:.55rem;color:var(--muted);text-align:center;padding:4px;border-radius:6px;border:1px solid var(--border2);}
.ccount{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);color:#fff;font-size:.68rem;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cname{font-size:.6rem;color:var(--muted);text-align:center;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sim-layout{display:grid;grid-template-columns:1fr 300px;gap:16px;}
@media(max-width:700px){.sim-layout{grid-template-columns:1fr;}}
.hand-area{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.hand-area h3{font-size:.82rem;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.hand-cards{display:flex;flex-wrap:wrap;gap:7px;min-height:125px;}
.side{display:flex;flex-direction:column;gap:10px;}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.info-card h3{font-size:.82rem;color:var(--muted);margin-bottom:8px;}
.deck-counter{font-size:2.2rem;font-weight:700;color:var(--text);font-family:'Zen Maru Gothic',sans-serif;text-align:center;line-height:1;}
.turn-badge{background:var(--accent);color:#fff;border-radius:20px;padding:4px 12px;font-size:.78rem;font-weight:700;text-align:center;margin-bottom:6px;}
.sup-btn{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:.76rem;color:var(--text);cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;margin-bottom:5px;width:100%;}
.sup-btn:hover{background:var(--border2);border-color:var(--accent);}
.sup-eff{font-size:.68rem;color:var(--muted);}
.n-row{display:flex;gap:6px;align-items:center;margin-top:4px;}
.n-input{width:48px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:4px 7px;color:var(--text);font-size:.78rem;text-align:center;}
.n-input:focus{outline:none;border-color:var(--accent);}
.alert{padding:9px 13px;border-radius:8px;font-size:.8rem;margin-bottom:14px;display:none;}
.alert.show{display:block;}
.alert-warn{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);color:var(--accent2);}
.alert-err{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#e74c3c;}
.alert-ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.3);color:var(--green);}
.prob-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.prob-table th{text-align:left;color:var(--muted);font-weight:500;padding:5px 0;border-bottom:1px solid var(--border);}
.prob-table td{padding:7px 0;border-bottom:1px solid var(--border);vertical-align:middle;}
.pbar-wrap{height:5px;background:var(--bg3);border-radius:3px;width:70px;display:inline-block;vertical-align:middle;margin-left:7px;}
.pbar{height:5px;background:var(--accent);border-radius:3px;}
.loading{text-align:center;padding:36px;color:var(--muted);font-size:.82rem;}
.spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ctile.sup-glow .cimg{border:2px solid var(--accent2);box-shadow:0 0 8px rgba(245,166,35,.4);}
#simLog{font-size:.73rem;color:var(--muted);max-height:180px;overflow-y:auto;line-height:1.9;}
.or-sep{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:.78rem;}
.or-sep::before,.or-sep::after{content:'';flex:1;height:1px;background:var(--border);}
</style>
</head>
<body>

<header>
  <div class="pokeball"></div>
  <div>
    <h1>PTCG 牌組測試工具</h1>
    <div class="sub">輸入序號或貼上牌組清單，開始模擬</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📋 牌組輸入</div>
  <div class="tab" onclick="switchTab('overview')">🃏 牌組總覽</div>
  <div class="tab" onclick="switchTab('sim')">🎮 對戰模擬</div>
  <div class="tab" onclick="switchTab('prob')">📊 機率計算</div>
</div>

<!-- ═══ TAB 1 ═══ -->
<div class="panel active" id="panel-input">
  <div class="icard">
    <h2>🔍 方法 A：輸入官網牌組序號</h2>
    <div class="code-row">
      <input class="code-input" id="codeInput" placeholder="例如：YZVqij-VbgcOn-TLxhEA">
      <button class="btn btn-primary" id="fetchBtn" onclick="fetchDeck()">查詢</button>
    </div>
    <div style="margin-top:8px;font-size:.72rem;color:var(--muted);">
      從 asia.pokemon-card.com/tw/deck-build/recipe/ 的網址複製序號
    </div>
  </div>
  <div class="or-sep">或</div>
  <div class="icard">
    <h2>📋 方法 B：從官網複製牌組清單貼上</h2>
    <textarea id="deckInput" placeholder="寶可夢卡(22)

火狐狸
M4 011/083
04
..."></textarea>
    <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="parsePaste()">✅ 解析清單</button>
      <button class="btn btn-secondary" onclick="document.getElementById('deckInput').value=''">🗑 清除</button>
    </div>
  </div>
  <div id="parseStatus" style="font-size:.78rem;color:var(--muted);margin-bottom:8px;"></div>
  <div class="alert alert-err" id="alertErr"></div>
  <div id="loadingDB" class="loading" style="display:none"><div class="spinner"></div>正在載入卡牌資料庫…</div>
  <div id="loadingFetch" class="loading" style="display:none"><div class="spinner"></div>正在查詢官網牌組…</div>
</div>

<!-- ═══ TAB 2 ═══ -->
<div class="panel" id="panel-overview">
  <div class="status-bar" id="statusBar"></div>
  <div id="deckOverview"></div>
</div>

<!-- ═══ TAB 3 ═══ -->
<div class="panel" id="panel-sim">
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="drawOpeningHand()">🔀 洗牌 / 起手牌</button>
    <button class="btn btn-blue" onclick="drawOne()">➕ 抽一張</button>
    <button class="btn btn-secondary btn-sm" onclick="resetSim()">↩ 重置</button>
  </div>
  <div class="alert alert-warn" id="alertMulligan"></div>
  <div class="sim-layout">
    <div>
      <div class="hand-area">
        <h3>
          <span>手牌</span>
          <span id="handCount" style="color:var(--text);font-weight:700;">0 張</span>
        </h3>
        <div class="hand-cards" id="handCards"></div>
      </div>
    </div>
    <div class="side">
      <div class="info-card" style="text-align:center;">
        <div class="turn-badge" id="turnBadge">第 0 回合</div>
        <div class="deck-counter" id="deckCounter">--</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:4px;">牌庫剩餘</div>
      </div>
      <div class="info-card" id="supporterPanel" style="display:none;">
        <h3>⚡ 可發動的支援者</h3>
        <div id="supporterActions"></div>
      </div>
      <div class="info-card">
        <h3>📜 回合紀錄</h3>
        <div id="simLog"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ TAB 4 ═══ -->
<div class="panel" id="panel-prob">
  <div class="icard">
    <h2>📊 起手牌機率計算（超幾何分佈，起手 7 張）</h2>
    <table class="prob-table">
      <thead><tr><th>卡牌名稱</th><th>張數</th><th>至少抽到 1 張</th><th>至少抽到 2 張</th></tr></thead>
      <tbody id="probBody"></tbody>
    </table>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 設定
// ═══════════════════════════════════════
const PROXY = 'https://corsproxy.io/?';

// Google Sheets：透過 CORS Proxy 抓取，避免被擋
const SHEET_ID  = '129Qa5N3BwHoTuTh8WeKAdg3BFlNITt4I47b8WQOMyAc';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const SPECIAL_SUP = {
  '莉莉艾的決意': { label:'莉莉艾的決意', eff:'手牌洗回牌庫，重新抽 6 張', fn:()=>reshuffleAndDraw(6,'莉莉艾的決意') },
  '裁判':         { label:'裁判',           eff:'手牌洗回牌庫，重新抽 4 張', fn:()=>reshuffleAndDraw(4,'裁判') },
  'N的謀劃':      { label:'N 的謀劃',       eff:'手牌洗回牌庫，重新抽 N 張', needsN:true },
};

// ═══════════════════════════════════════
// 狀態
// ═══════════════════════════════════════
let cardDB=[], deckList=[], drawPile=[], hand=[], turn=0, dbLoaded=false;

// ═══════════════════════════════════════
// 載入卡牌資料庫（透過 CORS Proxy）
// ═══════════════════════════════════════
async function loadCardDB(){
  if(dbLoaded) return true;
  show('loadingDB');

  // 嘗試三個方法，依序試
  const urls = [
    PROXY + encodeURIComponent(SHEET_URL),                                        // corsproxy.io
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`,   // gviz（有時能過）
    `https://api.allorigins.win/raw?url=${encodeURIComponent(SHEET_URL)}`,        // allorigins
  ];

  for(const url of urls){
    try{
      const res = await fetch(url, {signal: AbortSignal.timeout(10000)});
      if(!res.ok) continue;
      const text = await res.text();
      if(!text || text.length < 100) continue;
      const parsed = parseCSV(text);
      if(!parsed.length) continue;
      cardDB = parsed;
      dbLoaded = true;
      hide('loadingDB');
      return true;
    }catch(e){ /* 試下一個 */ }
  }

  hide('loadingDB');
  // 資料庫載入失敗不阻止解析，只是圖片和細節會缺少
  console.warn('卡牌資料庫載入失敗，將以卡名顯示');
  dbLoaded = true; // 標記已嘗試過，不再重試
  return true;
}

function parseCSV(text){
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const splitLine = line => {
    const cols=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else cur+=c;
    }
    cols.push(cur);
    return cols.map(c=>c.trim().replace(/^"|"$/g,''));
  };
  const lines=text.split('\n');
  const hdrs=splitLine(lines[0]);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const vals=splitLine(lines[i]);
    const obj={};
    hdrs.forEach((h,idx)=>{ obj[h]=(vals[idx]||'').trim(); });
    if(obj.name||obj.card_id) rows.push(obj);
  }
  return rows;
}

// ═══════════════════════════════════════
// 方法A：序號查詢
// ═══════════════════════════════════════
async function fetchDeck(){
  const code = document.getElementById('codeInput').value.trim();
  if(!code){ showErr('請輸入牌組序號'); return; }
  if(!/^[A-Za-z0-9]+-[A-Za-z0-9]+-[A-Za-z0-9]+$/.test(code)){
    showErr('格式錯誤，應為 xxxxxx-xxxxxx-xxxxxx'); return;
  }
  hideErr();
  show('loadingFetch');
  setBtnDisabled('fetchBtn', true);

  await loadCardDB();

  try{
    const targetUrl = `https://asia.pokemon-card.com/tw/deck-build/recipe/${code}/`;
    const resp = await fetch(PROXY + encodeURIComponent(targetUrl), {signal: AbortSignal.timeout(15000)});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const html = await resp.text();

    const cards = parseTWDeckHTML(html);
    if(!cards.length) throw new Error('找不到卡牌資料，請確認序號是否正確');

    deckList = cards.map(c=>{
      const csv = cardDB.find(r=>String(r.card_id)===String(c.card_id));
      return {
        name:     csv?.name      || '未知 #'+c.card_id,
        count:    c.qty,
        cardType: csv?.card_type || guessType(c.section),
        imageUrl: csv?.image_url || buildImgUrl(c.card_id),
        hp:       csv?.hp        || '',
        setName:  csv?.set_name  || '',
        found:    !!csv,
      };
    });

    const total = deckList.reduce((s,c)=>s+c.count,0);
    setStatus(`✅ 查詢成功：${deckList.length} 種卡牌，共 ${total} 張`);
    finishParse();

  }catch(e){
    showErr('❌ 查詢失敗：'+e.message+'（請改用方法B貼上清單）');
  }finally{
    hide('loadingFetch');
    setBtnDisabled('fetchBtn', false);
  }
}

function parseTWDeckHTML(html){
  const doc = new DOMParser().parseFromString(html,'text/html');
  const cards=[], seen=new Set();
  doc.body.querySelectorAll('h3').forEach(h3=>{
    const m=h3.textContent.trim().match(/^(.+?)[（(]\d+[)）]/);
    if(!m) return;
    const sec=m[1].trim();
    if(seen.has(sec)) return;
    seen.add(sec);
    const ul=h3.nextElementSibling;
    if(!ul||ul.tagName!=='UL') return;
    ul.querySelectorAll('li a[href*="/card-search/detail/"]').forEach(a=>{
      const idM=a.href.match(/\/card-search\/detail\/(\d+)\/?/);
      if(!idM) return;
      const qty=parseInt(a.textContent.trim().match(/(\d+)\s*$/)?.[1]||'1');
      cards.push({card_id:idM[1], qty, section:sec});
    });
  });
  return cards;
}

// 圖片網址可以直接用 card_id 推算
function buildImgUrl(card_id){
  if(!card_id) return '';
  return `https://asia.pokemon-card.com/tw/card-img/tw${String(card_id).padStart(8,'0')}.png`;
}

function guessType(sec){
  if(!sec) return '未知';
  if(sec.includes('寶可夢')) return '基礎';
  if(sec.includes('能量'))   return '基本能量卡';
  return '物品卡';
}

// ═══════════════════════════════════════
// 方法B：貼上清單
// ═══════════════════════════════════════
async function parsePaste(){
  const raw=document.getElementById('deckInput').value.trim();
  if(!raw){ showErr('請先貼上牌組清單'); return; }
  hideErr();
  await loadCardDB();

  deckList=[];
  // 保留空行，整體以換行分割，然後逐行 trim，過濾純空行
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);

  let i=0;
  while(i<lines.length){
    const line=lines[i];
    // 跳過分類標題（含中文分類名稱 + 括號數字）
    if(/^(寶可夢|訓練師|物品|支援者|競技場|能量|道具)/.test(line) && /[\(（]\d+[)）]/.test(line)){
      i++; continue;
    }
    // 嘗試讀取三行組合：卡名 / 編號 / 張數
    if(i+2<lines.length){
      const nameLine =lines[i];
      const codeLine =lines[i+1];
      const countLine=lines[i+2];
      // 編號行：字母數字開頭，空格後接任意字符
      const isCode  = /^[A-Za-z][A-Za-z0-9\-]*\s+[\w\-\/]+/.test(codeLine);
      // 張數行：1~2位純數字
      const isCount = /^\d{1,2}$/.test(countLine);
      if(isCode && isCount){
        const count=parseInt(countLine);
        const csv=findCard(nameLine);
        deckList.push({
          name:     nameLine,
          count,
          cardType: csv?.card_type || '未知',
          imageUrl: csv?.image_url || '',
          hp:       csv?.hp || '',
          setName:  csv?.set_name || '',
          found:    !!csv,
        });
        i+=3; continue;
      }
    }
    i++;
  }

  if(!deckList.length){ showErr('❌ 解析失敗，請確認格式是否正確（卡名 / 編號 / 張數 三行一組）'); return; }

  const total=deckList.reduce((s,c)=>s+c.count,0);
  setStatus(`✅ 解析完成：${deckList.length} 種卡牌，共 ${total} 張`);
  finishParse();
}

function findCard(name){
  if(!cardDB.length) return null;
  return cardDB.find(c=>c.name===name)
      || cardDB.find(c=>c.name?.trim()===name.trim())
      || cardDB.find(c=>c.name?.includes(name)||name.includes(c.name))
      || null;
}

function finishParse(){
  buildOverview();
  buildProbTable();
  resetSim();
  switchTab('overview');
}

// ═══════════════════════════════════════
// 牌組總覽
// ═══════════════════════════════════════
const POKE_T  = new Set(['基礎','1階進化','2階進化']);
const TRAIN_T = new Set(['物品卡','支援者卡','競技場卡','寶可夢道具']);
const ENERGY_T= new Set(['基本能量卡','特殊能量卡']);

function buildOverview(){
  const poke   =deckList.filter(c=>POKE_T.has(c.cardType));
  const trainer=deckList.filter(c=>TRAIN_T.has(c.cardType));
  const energy =deckList.filter(c=>ENERGY_T.has(c.cardType));
  const other  =deckList.filter(c=>!POKE_T.has(c.cardType)&&!TRAIN_T.has(c.cardType)&&!ENERGY_T.has(c.cardType));
  const total  =deckList.reduce((s,c)=>s+c.count,0);

  document.getElementById('statusBar').innerHTML=`
    <div class="stat-pill"><div class="dot dot-p"></div>寶可夢 ${sum(poke)} 張</div>
    <div class="stat-pill"><div class="dot dot-t"></div>訓練師 ${sum(trainer)} 張</div>
    <div class="stat-pill"><div class="dot dot-e"></div>能量 ${sum(energy)} 張</div>
    <div class="stat-pill">總計 ${total} 張</div>
    ${deckList.some(c=>!c.found)?`<div class="stat-pill" style="color:#e74c3c;">⚠ 部分卡牌未識別</div>`:''}
  `;

  let html='';
  if(poke.length)   html+=mkSection('🔴 寶可夢',poke);
  if(trainer.length)html+=mkSection('🔵 訓練師',trainer);
  if(energy.length) html+=mkSection('🟡 能量',energy);
  if(other.length)  html+=mkSection('⚪ 其他',other);
  document.getElementById('deckOverview').innerHTML=html;
}

function sum(arr){ return arr.reduce((s,c)=>s+c.count,0); }
function mkSection(label,cards){
  return `<div class="sec-label">${label}（${sum(cards)} 張）</div>
    <div class="cards-grid">${cards.map(cardTile).join('')}</div>`;
}
function cardTile(c){
  const hasImg=!!c.imageUrl;
  const img=hasImg?`<img class="cimg" src="${c.imageUrl}" alt="${esc(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
  const fallback=`<div class="cimg-err"${hasImg?' style="display:none"':''}>${esc(c.name)}</div>`;
  return `<div class="ctile">
    <div style="position:relative">${img}${fallback}<div class="ccount">${c.count}</div></div>
    <div class="cname">${esc(c.name)}</div></div>`;
}

// ═══════════════════════════════════════
// 模擬
// ═══════════════════════════════════════
function buildDrawPile(){
  drawPile=[];
  deckList.forEach(c=>{for(let i=0;i<c.count;i++) drawPile.push({...c});});
  shuffle(drawPile);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function drawOpeningHand(){
  buildDrawPile(); hand=[]; turn=0;
  for(let i=0;i<7&&drawPile.length;i++) hand.push(drawPile.pop());
  addLog('🔀 洗牌完成，抽起手牌 7 張');
  const hasBasic=hand.some(c=>c.cardType==='基礎');
  if(!hasBasic){
    document.getElementById('alertMulligan').className='alert alert-warn show';
    document.getElementById('alertMulligan').textContent='⚠️ 起手牌沒有基礎寶可夢！需要 Mulligan（洗牌重抽）';
    addLog('⚠️ 無基礎寶可夢，需 Mulligan');
  } else {
    document.getElementById('alertMulligan').className='alert alert-warn';
  }
  updateSim();
}

function drawOne(){
  if(!drawPile.length){addLog('❌ 牌庫已空！');return;}
  turn++;
  const card=drawPile.pop();
  hand.push(card);
  addLog(`第 ${turn} 回合：抽到【${card.name}】`);
  updateSim();
}

function reshuffleAndDraw(n,label){
  hand.forEach(c=>drawPile.push(c));
  shuffle(drawPile);
  hand=[];
  for(let i=0;i<n&&drawPile.length;i++) hand.push(drawPile.pop());
  addLog(`⚡ 發動【${label}】：洗回手牌，重新抽 ${n} 張`);
  updateSim();
}

function resetSim(){
  drawPile=[]; hand=[]; turn=0;
  document.getElementById('handCards').innerHTML='<span style="color:var(--muted);font-size:.78rem">按「洗牌」開始</span>';
  document.getElementById('handCount').textContent='0 張';
  document.getElementById('deckCounter').textContent=deckList.reduce((s,c)=>s+c.count,0)||'--';
  document.getElementById('turnBadge').textContent='第 0 回合';
  document.getElementById('simLog').innerHTML='';
  document.getElementById('supporterPanel').style.display='none';
  document.getElementById('alertMulligan').className='alert alert-warn';
}

function updateSim(){
  const hc=document.getElementById('handCards');
  if(!hand.length){
    hc.innerHTML='<span style="color:var(--muted);font-size:.78rem">手牌為空</span>';
  } else {
    hc.innerHTML=hand.map(c=>{
      const isSup=SPECIAL_SUP[c.name];
      const hasImg=!!c.imageUrl;
      const img=hasImg?`<img class="cimg" src="${c.imageUrl}" alt="${esc(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
      const fallback=`<div class="cimg-err"${hasImg?' style="display:none"':''}>${esc(c.name)}</div>`;
      return `<div class="ctile ${isSup?'sup-glow':''}">
        <div style="position:relative">${img}${fallback}</div>
        <div class="cname">${esc(c.name)}</div></div>`;
    }).join('');
  }
  document.getElementById('handCount').textContent=hand.length+' 張';
  document.getElementById('deckCounter').textContent=drawPile.length;
  document.getElementById('turnBadge').textContent=turn===0?'起手牌':`第 ${turn} 回合`;

  const activeSups=[...new Set(hand.filter(c=>SPECIAL_SUP[c.name]).map(c=>c.name))];
  if(activeSups.length){
    document.getElementById('supporterPanel').style.display='block';
    document.getElementById('supporterActions').innerHTML=activeSups.map(name=>{
      const s=SPECIAL_SUP[name];
      if(s.needsN) return `<div class="sup-btn" style="flex-direction:column;align-items:flex-start;gap:3px;">
        <div>${s.label}</div><div class="sup-eff">${s.eff}</div>
        <div class="n-row">
          <input type="number" class="n-input" id="nVal_${name}" value="4" min="1" max="10">
          <button class="btn btn-sm btn-secondary" onclick="activateSup('${name}')">發動</button>
        </div></div>`;
      return `<button class="sup-btn" onclick="activateSup('${name}')">
        <div><div>${s.label}</div><div class="sup-eff">${s.eff}</div></div>
        <span style="color:var(--accent)">▶</span></button>`;
    }).join('');
  } else {
    document.getElementById('supporterPanel').style.display='none';
  }
}

function activateSup(name){
  const s=SPECIAL_SUP[name];
  const idx=hand.findIndex(c=>c.name===name);
  if(idx!==-1) hand.splice(idx,1);
  if(s.needsN){
    const n=parseInt(document.getElementById('nVal_'+name)?.value||4)||4;
    reshuffleAndDraw(n,'N 的謀劃');
  } else { s.fn(); }
}

function addLog(msg){
  const el=document.getElementById('simLog');
  el.innerHTML+=`<div>${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

// ═══════════════════════════════════════
// 機率
// ═══════════════════════════════════════
function buildProbTable(){
  const N=deckList.reduce((s,c)=>s+c.count,0);
  document.getElementById('probBody').innerHTML=deckList.map(c=>{
    const p1=(hyperAtLeast(N,c.count,7,1)*100).toFixed(1);
    const p2=c.count>=2?(hyperAtLeast(N,c.count,7,2)*100).toFixed(1):null;
    return `<tr>
      <td>${esc(c.name)}</td>
      <td style="color:var(--muted)">${c.count}</td>
      <td>${p1}%<span class="pbar-wrap"><span class="pbar" style="width:${p1}%"></span></span></td>
      <td>${p2!==null?p2+'%':'-'}</td></tr>`;
  }).join('');
}
function hyperAtLeast(N,K,n,k){ let p=0;for(let i=0;i<k;i++) p+=hyperExact(N,K,n,i);return Math.max(0,Math.min(1,1-p)); }
function hyperExact(N,K,n,k){ return comb(K,k)*comb(N-K,n-k)/comb(N,n); }
function comb(n,k){ if(k<0||k>n)return 0;if(k===0||k===n)return 1;k=Math.min(k,n-k);let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return r; }

// ═══════════════════════════════════════
// UI 工具
// ═══════════════════════════════════════
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function showErr(msg){const el=document.getElementById('alertErr');el.textContent=msg;el.className='alert alert-err show';}
function hideErr(){document.getElementById('alertErr').className='alert alert-err';}
function setStatus(msg){document.getElementById('parseStatus').textContent=msg;}
function setBtnDisabled(id,val){document.getElementById(id).disabled=val;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter') fetchDeck();});
</script>
