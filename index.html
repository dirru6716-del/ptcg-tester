<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PTCG 牌組測試工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --text:#e8eaf0;--muted:#7a7f9a;
  --accent:#e63b3b;--accent2:#f5a623;
  --blue:#4a90e2;--green:#27ae60;--purple:#8e44ad;
  --card-w:72px;--card-h:100px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* ── HEADER ── */
header{background:linear-gradient(135deg,#1a0a0a,#1a1d27);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;}
header h1{font-family:'Zen Maru Gothic',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent);}
.header-right{margin-left:auto;text-align:right;}
.version{font-size:.58rem;color:var(--muted);}
.db-ok{font-size:.6rem;color:var(--green);}
.pokeball{width:26px;height:26px;background:conic-gradient(var(--accent) 180deg,#fff 180deg);border-radius:50%;border:2px solid #fff;position:relative;flex-shrink:0;}
.pokeball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:#fff;border:2px solid #333;}
/* ── TABS ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;}
.tab{padding:9px 13px;font-size:.8rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
/* ── PANELS ── */
.panel{display:none;padding:14px;}
.panel.active{display:block;}
/* ── INPUT ── */
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.icard h2{font-size:.82rem;color:var(--muted);margin-bottom:10px;font-weight:500;}
textarea{width:100%;height:200px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--text);font-family:monospace;font-size:.75rem;resize:vertical;line-height:1.7;}
textarea:focus{outline:none;border-color:var(--accent);}
.hint{font-size:.66rem;color:var(--muted);margin-top:6px;line-height:1.6;}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:8px;border:none;font-size:.8rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:500;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#c0392b;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-sm{padding:4px 9px;font-size:.72rem;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
/* ── STATUS BAR ── */
.status-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:.74rem;display:flex;align-items:center;gap:4px;}
.dot{width:6px;height:6px;border-radius:50%;}
.dot-p{background:#e74c3c;}.dot-t{background:#3498db;}.dot-e{background:#f39c12;}
/* ── OVERVIEW GRID ── */
.sec-label{font-size:.68rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:14px 0 7px;display:flex;align-items:center;gap:7px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.cards-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:5px;}
.ctile{position:relative;width:var(--card-w);cursor:default;transition:transform .15s;}
.ctile:hover{transform:scale(1.08);z-index:10;}
.cimg{width:var(--card-w);height:var(--card-h);object-fit:cover;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);display:block;}
.cimg-err{width:var(--card-w);height:var(--card-h);display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:.5rem;color:var(--muted);text-align:center;padding:3px;border-radius:5px;border:1px solid var(--border2);}
.ccount{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.8);color:#fff;font-size:.62rem;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cname{font-size:.56rem;color:var(--muted);text-align:center;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ══════════════════════════════════════════
   BATTLE FIELD
══════════════════════════════════════════ */
.battle-wrap{display:flex;flex-direction:column;gap:8px;padding-bottom:20px;}

/* top bar: prizes + deck + discard */
.battle-topbar{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.prizes-row{display:flex;gap:4px;align-items:center;}
.prize-card{width:28px;height:39px;border-radius:3px;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--muted);cursor:pointer;transition:all .15s;}
.prize-card.taken{background:transparent;border-color:var(--border);opacity:.3;}
.prize-card:not(.taken):hover{border-color:var(--accent2);}
.battle-counter{text-align:center;padding:0 6px;}
.bc-num{font-family:'Zen Maru Gothic',sans-serif;font-size:1.4rem;font-weight:700;line-height:1;}
.bc-lbl{font-size:.58rem;color:var(--muted);}
.discard-pile{width:40px;height:55px;border-radius:5px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;cursor:pointer;transition:all .15s;position:relative;}
.discard-pile:hover{border-color:var(--accent2);}
.discard-top{width:36px;height:50px;border-radius:4px;object-fit:cover;}
.discard-count{font-size:.55rem;color:var(--muted);}

/* field card zone */
.field-zone{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;min-height:48px;}
.field-zone-label{font-size:.66rem;color:var(--muted);white-space:nowrap;}
.stadium-slot{width:52px;height:37px;border-radius:4px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--muted);cursor:pointer;}
.stadium-slot img{width:52px;height:37px;object-fit:cover;border-radius:4px;}

/* active + bench row */
.field-main{display:flex;gap:8px;}
.active-zone{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;flex-shrink:0;width:130px;}
.active-zone h4{font-size:.66rem;color:var(--accent);margin-bottom:6px;text-align:center;}
.bench-zone{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;flex:1;}
.bench-zone h4{font-size:.66rem;color:var(--blue);margin-bottom:6px;}
.bench-slots{display:flex;gap:6px;flex-wrap:wrap;}

/* pokemon slot card */
.poke-slot{position:relative;width:76px;border:2px solid var(--border2);border-radius:8px;padding:5px;background:var(--bg3);cursor:pointer;transition:all .2s;text-align:center;}
.poke-slot:hover{border-color:var(--blue);transform:translateY(-2px);}
.poke-slot.active-poke{border-color:var(--accent);box-shadow:0 0 10px rgba(230,59,59,.3);}
.poke-slot.empty-slot{border-style:dashed;opacity:.5;width:60px;height:88px;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted);}
.poke-slot.empty-slot:hover{opacity:.8;border-color:var(--green);}
.poke-img{width:64px;height:45px;object-fit:cover;border-radius:4px;display:block;margin:0 auto;}
.poke-img-err{width:64px;height:45px;background:var(--bg2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.48rem;color:var(--muted);text-align:center;}
.poke-name{font-size:.56rem;color:var(--text);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.poke-hp-bar{height:4px;background:var(--bg);border-radius:2px;margin:3px 0;}
.poke-hp-fill{height:4px;border-radius:2px;transition:width .3s;}
.poke-hp-text{font-size:.55rem;color:var(--muted);}
.poke-energy{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;justify-content:center;}
.energy-pip{width:12px;height:12px;border-radius:50%;font-size:.42rem;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;}
.ep-草{background:#50c050;}.ep-火{background:#e06030;}.ep-水{background:#3090f0;}
.ep-雷{background:#f0c020;color:#000;}.ep-超{background:#c060e0;}.ep-鬥{background:#c08030;}
.ep-惡{background:#7060b0;}.ep-鋼{background:#9090b0;}.ep-龍{background:#6050d0;}
.ep-無{background:#9098b8;color:#222;}.ep-基{background:#888;}
.status-badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;justify-content:center;}
.sbadge{font-size:.48rem;padding:1px 4px;border-radius:3px;font-weight:700;}
.sb-poison{background:#8e44ad;color:#fff;}
.sb-burn{background:#e74c3c;color:#fff;}
.sb-sleep{background:#2c3e50;color:#fff;}
.sb-paralyze{background:#f39c12;color:#000;}
.sb-confuse{background:#1abc9c;color:#fff;}
.poke-tool{font-size:.48rem;color:var(--accent2);margin-top:1px;}

/* hand area */
.hand-zone{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;}
.hand-zone h4{font-size:.66rem;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.hand-cards{display:flex;flex-wrap:wrap;gap:6px;min-height:105px;align-content:flex-start;}
.hcard{position:relative;width:60px;cursor:pointer;transition:transform .15s;}
.hcard:hover{transform:translateY(-5px);z-index:10;}
.hcard.selected{outline:2px solid var(--accent2);border-radius:5px;}
.himg{width:60px;height:84px;object-fit:cover;border-radius:5px;border:1px solid var(--border2);display:block;}
.himg-err{width:60px;height:84px;display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:.48rem;color:var(--muted);text-align:center;padding:3px;border-radius:5px;border:1px solid var(--border2);}
.hname{font-size:.52rem;color:var(--muted);text-align:center;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hcard.supporter .himg,.hcard.supporter .himg-err{border-color:var(--blue);}
.hcard.item .himg,.hcard.item .himg-err{border-color:var(--green);}
.hcard.energy .himg,.hcard.energy .himg-err{border-color:var(--accent2);}
.hcard.stadium .himg,.hcard.stadium .himg-err{border-color:var(--purple);}

/* sim controls */
.sim-controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.turn-badge{background:var(--accent);color:#fff;border-radius:12px;padding:3px 10px;font-size:.74rem;font-weight:700;}
.supporter-used{font-size:.68rem;color:var(--muted);margin-left:4px;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-bg.center{align-items:center;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:16px;}
.modal-bg.center .modal{border-radius:14px;margin:16px;}
.modal h3{font-size:.9rem;font-weight:700;margin-bottom:10px;color:var(--accent2);}
.modal-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.card-effect-box{background:var(--bg3);border-radius:8px;padding:10px;font-size:.76rem;color:var(--text);line-height:1.7;margin-bottom:10px;}
.card-effect-box .eff-title{font-weight:700;color:var(--accent2);margin-bottom:4px;font-size:.78rem;}
.card-effect-box .ability-name{font-weight:700;color:var(--purple);margin-bottom:2px;}

/* selectable list in modal */
.select-list{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow-y:auto;margin:8px 0;}
.select-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;cursor:pointer;transition:all .15s;}
.select-item:hover{border-color:var(--accent2);}
.select-item.checked{border-color:var(--green);background:rgba(39,174,96,.1);}
.select-item img{width:32px;height:45px;object-fit:cover;border-radius:3px;}
.select-item .si-name{font-size:.78rem;flex:1;}
.select-item .si-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;}
.select-item.checked .si-check{background:var(--green);border-color:var(--green);color:#fff;}

/* hp adjust */
.hp-adjust{display:flex;align-items:center;gap:8px;margin:8px 0;}
.hp-adjust input{width:70px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-size:.88rem;text-align:center;}
.status-toggles{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.stoggle{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);font-size:.72rem;cursor:pointer;transition:all .15s;background:var(--bg3);}
.stoggle.on.poison{background:#8e44ad;border-color:#8e44ad;color:#fff;}
.stoggle.on.burn{background:#e74c3c;border-color:#e74c3c;color:#fff;}
.stoggle.on.sleep{background:#2c3e50;border-color:#2c3e50;color:#fff;}
.stoggle.on.paralyze{background:#f39c12;border-color:#f39c12;color:#000;}
.stoggle.on.confuse{background:#1abc9c;border-color:#1abc9c;color:#fff;}

/* alert */
.alert{padding:8px 12px;border-radius:8px;font-size:.76rem;margin-bottom:10px;display:none;}
.alert.show{display:block;}
.alert-warn{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);color:var(--accent2);}
.alert-err{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#e74c3c;}
.alert-ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.3);color:var(--green);}
/* parse status */
.parse-status{font-size:.74rem;min-height:16px;margin:7px 0 2px;}
.parse-ok{color:var(--green);}.parse-err{color:#e74c3c;}
/* log */
.log-box{font-size:.69rem;color:var(--muted);max-height:120px;overflow-y:auto;line-height:1.9;background:var(--bg3);border-radius:6px;padding:6px 8px;}

/* prob */
.prob-table{width:100%;border-collapse:collapse;font-size:.74rem;}
.prob-table th{text-align:left;color:var(--muted);font-weight:500;padding:5px 0;border-bottom:1px solid var(--border);}
.prob-table td{padding:5px 0;border-bottom:1px solid var(--border);vertical-align:middle;}
.pbar-wrap{height:4px;background:var(--bg3);border-radius:2px;width:60px;display:inline-block;vertical-align:middle;margin-left:5px;}
.pbar{height:4px;background:var(--accent);border-radius:2px;}
/* deck code */
.deck-code-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;margin-bottom:12px;}
.deck-code-val{font-family:monospace;font-size:.88rem;color:var(--accent2);font-weight:700;letter-spacing:1px;flex:1;}
.copy-btn{padding:3px 9px;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--muted);font-size:.67rem;cursor:pointer;}
</style>
</head>
<body>
<header>
  <div class="pokeball"></div>
  <div><h1>PTCG 牌組測試</h1></div>
  <div class="header-right">
    <div class="version">2025/06/01 BUILD</div>
    <div class="db-ok">✅ 1403 種卡牌</div>
  </div>
</header>
<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📋 輸入</div>
  <div class="tab" onclick="switchTab('overview')">🃏 總覽</div>
  <div class="tab" onclick="switchTab('battle')">⚔️ 對戰模擬</div>
  <div class="tab" onclick="switchTab('prob')">📊 機率</div>
</div>

<!-- INPUT -->
<div class="panel active" id="panel-input">
  <div class="icard">
    <h2>📋 貼上官網牌組頁面全文</h2>
    <textarea id="deckInput" placeholder="用 iOS 捷徑全選複製官網牌組頁面，整個貼在這裡。工具自動過濾頁首頁尾。"></textarea>
    <div class="hint">💡 在官網牌組頁面長按→全選→複製，整頁貼過來即可，不需手動清理。</div>
    <div style="margin-top:9px;display:flex;gap:7px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="parsePaste()">✅ 解析</button>
      <button class="btn btn-secondary btn-sm" onclick="loadDemo()">📝 範例</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('deckInput').value=''">🗑 清除</button>
    </div>
    <div class="parse-status" id="parseStatus"></div>
  </div>
  <div class="alert alert-err" id="alertErr"></div>
</div>

<!-- OVERVIEW -->
<div class="panel" id="panel-overview">
  <div id="deckCodeBar" style="display:none" class="deck-code-bar">
    <span style="font-size:.7rem;color:var(--muted);white-space:nowrap">🔖 牌組編碼</span>
    <span class="deck-code-val" id="deckCodeVal">—</span>
    <button class="copy-btn" onclick="copyCode()">複製</button>
  </div>
  <div class="status-bar" id="statusBar"></div>
  <div id="deckOverview"></div>
</div>

<!-- BATTLE -->
<div class="panel" id="panel-battle">
  <!-- controls -->
  <div class="sim-controls">
    <button class="btn btn-primary btn-sm" onclick="startGame()">🔀 開始/重新洗牌</button>
    <button class="btn btn-blue btn-sm" onclick="drawOne()">➕ 抽一張</button>
    <button class="btn btn-secondary btn-sm" onclick="endTurn()">⏩ 結束回合</button>
    <span class="turn-badge" id="turnBadge">準備中</span>
    <span class="supporter-used" id="supUsed"></span>
  </div>
  <div class="alert alert-warn" id="alertMulligan"></div>

  <div class="battle-wrap">
    <!-- prizes + deck + discard -->
    <div class="battle-topbar">
      <div>
        <div style="font-size:.62rem;color:var(--muted);margin-bottom:4px;">獎賞卡</div>
        <div class="prizes-row" id="prizesRow"></div>
      </div>
      <div style="flex:1"></div>
      <div class="battle-counter" onclick="showDeckContents()">
        <div class="bc-num" id="deckNum">--</div>
        <div class="bc-lbl">牌庫</div>
      </div>
      <div class="discard-pile" onclick="showDiscard()" title="棄牌區">
        <div id="discardTop" style="font-size:.55rem;color:var(--muted)">棄牌</div>
        <div class="discard-count" id="discardNum">0</div>
      </div>
    </div>

    <!-- stadium -->
    <div class="field-zone">
      <span class="field-zone-label">🏟 競技場</span>
      <div class="stadium-slot" id="stadiumSlot" onclick="removeStadium()">空</div>
      <span style="font-size:.62rem;color:var(--muted);margin-left:8px;" id="stadiumName"></span>
    </div>

    <!-- active + bench -->
    <div class="field-main">
      <div class="active-zone">
        <h4>⚔️ 戰鬥場</h4>
        <div id="activeSlot" class="poke-slot empty-slot" onclick="promptPlaceActive()">＋<br>放置</div>
      </div>
      <div class="bench-zone">
        <h4>🪑 備戰區</h4>
        <div class="bench-slots" id="benchSlots"></div>
      </div>
    </div>

    <!-- hand -->
    <div class="hand-zone">
      <h4>
        <span>🤚 手牌</span>
        <span id="handCountLbl" style="color:var(--text);font-weight:700">0 張</span>
      </h4>
      <div class="hand-cards" id="handCards"></div>
    </div>

    <!-- log -->
    <div class="icard" style="margin-bottom:0">
      <h2>📜 回合記錄</h2>
      <div class="log-box" id="simLog"></div>
    </div>
  </div>
</div>

<!-- PROB -->
<div class="panel" id="panel-prob">
  <div class="icard">
    <h2>📊 起手牌機率（起手 7 張）</h2>
    <table class="prob-table">
      <thead><tr><th>卡牌</th><th>張數</th><th>≥1張</th><th>≥2張</th></tr></thead>
      <tbody id="probBody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->

,["17188","探險家的嚮導","支援者卡","","","","查看自己的牌庫上方6張卡，從其中選擇2張卡加入手牌。將剩餘卡丟棄。","https://asia.pokemon-card.com/tw/card-img/tw00017188.png"],["17189","鬥子","支援者卡","","","","從自己的牌庫選擇進化寶可夢卡與能量卡各1張，在給對手看過後加入手牌。並且重洗牌庫。","https://asia.pokemon-card.com/tw/card-img/tw00017189.png"],["17191","海岱","支援者卡","","","","選擇2張自己的手牌，以任意順序排列，放回牌庫下方。然後，從牌庫抽出4張卡。（若無法放回2張自己的手牌，則無法使用這張卡。）","https://asia.pokemon-card.com/tw/card-img/tw00017191.png"],["17190","朵拉塞娜","支援者卡","","","","將自己的手牌全部放回牌庫並重洗。然後，擲1次硬幣，若為正面，則從牌庫抽出8張卡，若為反面，則從牌庫抽出3張卡。","https://asia.pokemon-card.com/tw/card-img/tw00017190.png"],["17192","八朔","支援者卡","","","","這張卡必須在上個對手的回合自己的寶可夢【昏厥】了才可使用。\n\n查看自己的牌庫上方8張卡，從其中選擇最多3張卡加入手牌。將剩餘卡放回牌庫並重洗。","https://asia.pokemon-card.com/tw/card-img/tw00017192.png"],["17193","白蕾雅","支援者卡","","","","這張卡只有在對手剩餘獎賞卡的張數為2張時才可使用。\n\n在這個回合，若對手的戰鬥寶可夢因自己的「太晶」寶可夢使用的招式的傷害而【昏厥】了，則多獲得1張獎賞卡。","https://asia.pokemon-card.com/tw/card-img/tw00017193.png"],["17195","老大的指令","支援者卡","","","","選擇1隻對手的備戰寶可夢，與戰鬥寶可夢互換。","https://asia.pokemon-card.com/tw/card-img/tw00017195.png"],["17194","白露的真心","支援者卡","","","","將自己的1隻剩餘HP為「30」以下的寶可夢的HP全部恢復。","https://asia.pokemon-card.com/tw/card-img/tw00017194.png"],["17196","真菰","支援者卡","","","","將自己的所有寶可夢各恢復「40」HP。","https://asia.pokemon-card.com/tw/card-img/tw00017196.png"],["17197","馬志士的交易","支援者卡","","","","詢問對手是否希望「雙方玩家各自獲得1張獎賞卡。」。若對手希望，則雙方玩家各自獲得1張獎賞卡。若不希望，則自己從牌庫抽出4張卡。","https://asia.pokemon-card.com/tw/card-img/tw00017197.png"],["17198","松葉的信心","支援者卡","","","","這張卡必須將自己的1張手牌丟棄才可使用。\n\n從自己的牌庫抽出與對手的備戰寶可夢相同數量的卡。","https://asia.pokemon-card.com/tw/card-img/tw00017198.png"],["17199","阿蜜的目光","支援者卡","","","","在下個對手的回合，自己的所有寶可夢受到對手的寶可夢招式的傷害「-30」點。（包含新上場的寶可夢。）","https://asia.pokemon-card.com/tw/card-img/tw00017199.png"],["18325","莉莉艾的決意","支援者卡","","","","將自己的手牌全部放回牌庫並重洗。然後，從牌庫抽出6張卡。若自己剩餘獎賞卡的張數為6張，則改為抽出8張卡。","https://asia.pokemon-card.com/tw/card-img/tw00018325.png"],["17201","琉琪亞的展示","支援者卡","","","","選擇1隻對手的備戰區的【基礎】寶可夢，與戰鬥寶可夢互換。然後，將新上場的寶可夢【混亂】。","https://asia.pokemon-card.com/tw/card-img/tw00017201.png"],["17203","火箭隊的阿波羅","支援者卡","","","","這張卡必須在上個對手的回合自己的「火箭隊的寶可夢」【昏厥】了才可使用。\n \n 雙方玩家各將手牌全部放回牌庫並重洗。然後，從牌庫抽卡，自己抽出5張，對手抽出3張。","https://asia.pokemon-card.com/tw/card-img/tw00017203.png"],["17202","火箭隊的雅典娜","支援者卡","","","","從牌庫抽卡直到自己的手牌滿5張為止。若自己的所有場上寶可夢皆為「火箭隊的寶可夢」，則抽卡直到滿8張為止。","https://asia.pokemon-card.com/tw/card-img/tw00017202.png"],["17204","火箭隊的坂木","支援者卡","","","","將自己的戰鬥場的「火箭隊的寶可夢」與備戰區的「火箭隊的寶可夢」互換。然後，選擇1隻對手的備戰寶可夢，與戰鬥寶可夢互換。","https://asia.pokemon-card.com/tw/card-img/tw00017204.png"],["17205","火箭隊的拉姆達","支援者卡","","","","從自己的牌庫選擇1張訓練家卡，在給對手看過後加入手牌。並且重洗牌庫。","https://asia.pokemon-card.com/tw/card-img/tw00017205.png"],["17206","火箭隊的蘭斯","支援者卡","","","","這張卡在先攻玩家的最初回合也可使用。\n\n從自己的牌庫選擇最多3張【基礎】寶可夢的「火箭隊的寶可夢」，在給對手看過後加入手牌。並且重洗牌庫。","https://asia.pokemon-card.com/tw/card-img/tw00017206.png"],["17209","回力鏢能量","特殊能量卡","","","","只要這張卡附於寶可夢身上，視為提供1個【無】能量。\n \n若因附有這張卡的寶可夢使用的招式的效果使這張卡被丟棄，則在招式的傷害與效果的影響之後，重新附於原本的寶可夢身上。","https://asia.pokemon-card.com/tw/card-img/tw00017209.png"],["17208","扣殺能量","特殊能量卡","","","","只要這張卡附於寶可夢身上，視為提供1個【無】能量。\n\n附有這張卡的寶可夢在戰鬥場受到對手的寶可夢招式的傷害時，在使用招式的寶可夢身上放置2個傷害指示物。","https://asia.pokemon-card.com/tw/card-img/tw00017208.png"],["17207","燃火能量","特殊能量卡","","","","將附於寶可夢身上的這張卡，在自己的回合結束時丟棄。\n\n只要這張卡附於寶可夢身上，視為提供1個【無】能量。\n\n若附於進化寶可夢身上，則視為提供3個【無】能量。","https://asia.pokemon-card.com/tw/card-img/tw00017207.png"],["17210","稜鏡能量","特殊能量卡","","","","只要這張卡附於寶可夢身上，視為提供1個【無】能量。\n\n若附於【基礎】寶可夢身上，則視為提供1個所有屬性的能量。","https://asia.pokemon-card.com/tw/card-img/tw00017210.png"],["17211","富裕能量","特殊能量卡","","","","只要這張卡附於寶可夢身上，視為提供1個【無】能量。\n\n從手牌將這張卡附於寶可夢身上時，從自己的牌庫抽出4張卡。","https://asia.pokemon-card.com/tw/card-img/tw00017211.png"],["17212","古舊能量","特殊能量卡","","","","只要這張卡附於寶可夢身上，視為提供1個所有屬性的能量。\n\n附有這張卡的寶可夢受到對手的寶可夢招式的傷害而【昏厥】時，被獲得的獎賞卡減少1張。對戰中，自己的「古舊能量」的這個效果只生效1次。","https://asia.pokemon-card.com/tw/card-img/tw00017212.png"],["17213","火箭隊能量","特殊能量卡","","","","這張卡只可附於「火箭隊的寶可夢」身上，若附於「火箭隊的寶可夢」以外的寶可夢身上，則將其丟棄。\n \n只要這張卡附於寶可夢身上，視為提供2個【超】【惡】2種屬性的能量。","https://asia.pokemon-card.com/tw/card-img/tw00017213.png window.addEventListener('DOMContentLoaded',()=>{ document.getElementById('deckInput').value=DEFAULT_DECK; });
function loadDemo(){ document.getElementById('deckInput').value=DEFAULT_DECK; setStatus('已載入範例','ok'); }

function parsePaste(){
  const raw=document.getElementById('deckInput').value;
  if(!raw.trim()){ showErr('請先貼上內容'); return; }
  hideErr();
  const lines=raw.split('\n');
  const SECTION_PAT=/^(寶可夢卡|寶可夢道具|物品卡|支援者卡|競技場卡|能量卡|訓練師卡)[（(]\d+[)）]/;
  let startIdx=-1;
  for(let i=0;i<lines.length;i++){ if(SECTION_PAT.test(lines[i].trim())){ startIdx=i;break; } }
  if(startIdx<0){ showErr('❌ 找不到牌組資料'); return; }
  const END=['以此牌組為基礎','牌組編碼','列印牌組','TOP','Contact','Site Map'];
  let endIdx=lines.length;
  for(let i=startIdx+1;i<lines.length;i++){ if(END.some(m=>lines[i].includes(m))){ endIdx=i;break; } }
  currentDeckCode='';
  for(let i=endIdx;i<Math.min(endIdx+10,lines.length);i++){
    const m=lines[i].match(/([A-Za-z0-9]{6}-[A-Za-z0-9]{6}-[A-Za-z0-9]{6})/);
    if(m){ currentDeckCode=m[1];break; }
  }
  const deckLines=lines.slice(startIdx,endIdx).map(l=>l.trim()).filter(l=>l);
  deckList=[];
  let i=0;
  while(i<deckLines.length){
    const line=deckLines[i];
    if(SECTION_PAT.test(line)){ i++;continue; }
    if(i+2<deckLines.length){
      const n=deckLines[i],c=deckLines[i+1],q=deckLines[i+2];
      if(/^[A-Za-z][A-Za-z0-9\-]*\s+[\w\-\/]+/.test(c)&&/^\d{1,2}$/.test(q)){
        const info=findCard(n);
        deckList.push({name:n,count:parseInt(q),cardType:info?.cardType||'未知',imageUrl:info?.imageUrl||'',hp:info?.hp||'',types:info?.types||'',abilities:info?.abilities||'',attacks:info?.attacks||'',found:!!info});
        i+=3;continue;
      }
    }
    i++;
  }
  if(!deckList.length){ showErr('❌ 解析失敗'); return; }
  const total=deckList.reduce((s,c)=>s+c.count,0);
  const notFound=deckList.filter(c=>!c.found).length;
  let msg=`✅ 解析完成：${deckList.length} 種，共 ${total} 張`;
  if(currentDeckCode) msg+=`　編碼：${currentDeckCode}`;
  if(notFound) msg+=`　⚠ ${notFound} 種未識別`;
  setStatus(msg,'ok');
  buildOverview(); buildProbTable();
  switchTab('overview');
}
function findCard(name){
  if(cardMap.has(name)) return cardMap.get(name);
  for(const [k,v] of cardMap){ if(k.includes(name)||name.includes(k)) return v; }
  return null;
}

// ════ OVERVIEW ════
function buildOverview(){
  const poke=deckList.filter(c=>POKE_T.has(c.cardType));
  const trainer=deckList.filter(c=>TRAIN_T.has(c.cardType));
  const energy=deckList.filter(c=>ENERGY_T.has(c.cardType));
  const total=deckList.reduce((s,c)=>s+c.count,0);
  const codeBar=document.getElementById('deckCodeBar');
  if(currentDeckCode){ document.getElementById('deckCodeVal').textContent=currentDeckCode; codeBar.style.display='flex'; }
  else codeBar.style.display='none';
  document.getElementById('statusBar').innerHTML=`
    <div class="stat-pill"><div class="dot dot-p"></div>寶可夢 ${sum(poke)} 張</div>
    <div class="stat-pill"><div class="dot dot-t"></div>訓練師 ${sum(trainer)} 張</div>
    <div class="stat-pill"><div class="dot dot-e"></div>能量 ${sum(energy)} 張</div>
    <div class="stat-pill">總計 ${total} 張</div>
    ${deckList.some(c=>!c.found)?'<div class="stat-pill" style="color:#e74c3c;">⚠ 部分未識別</div>':''}`;
  let html='';
  if(poke.length) html+=mkSection('🔴 寶可夢',poke);
  if(trainer.length) html+=mkSection('🔵 訓練師',trainer);
  if(energy.length) html+=mkSection('🟡 能量',energy);
  document.getElementById('deckOverview').innerHTML=html;
}
function sum(arr){ return arr.reduce((s,c)=>s+c.count,0); }
function mkSection(label,cards){
  return `<div class="sec-label">${label}（${sum(cards)} 張）</div><div class="cards-grid">${cards.map(cardTile).join('')}</div>`;
}
function cardTile(c){
  const hasImg=!!c.imageUrl;
  const img=hasImg?`<img class="cimg" src="${c.imageUrl}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
  const err=`<div class="cimg-err" ${hasImg?'style="display:none"':''}>${esc(c.name)}</div>`;
  return `<div class="ctile"><div style="position:relative">${img}${err}<div class="ccount">${c.count}</div></div><div class="cname">${esc(c.name)}</div></div>`;
}

// ════ BATTLE CORE ════
function buildDrawPile(){
  drawPile=[];
  deckList.forEach(c=>{ for(let i=0;i<c.count;i++) drawPile.push({...c}); });
  shuffle(drawPile);
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } }

function startGame(){
  buildDrawPile();
  hand=[]; discard=[]; prizes=[];
  activeSlot=null; benchSlots=[]; stadium=null;
  turn=0; supporterUsedThisTurn=false;
  document.getElementById('simLog').innerHTML='';
  for(let i=0;i<6&&drawPile.length;i++) prizes.push(drawPile.pop());
  for(let i=0;i<7&&drawPile.length;i++) hand.push(drawPile.pop());
  addLog('🔀 洗牌完成。獎賞卡6張，起手牌7張。');
  const hasBasic=hand.some(c=>c.cardType==='基礎');
  if(!hasBasic){ setAlert('alertMulligan','⚠️ 起手無基礎寶可夢！需要 Mulligan','show'); addLog('⚠️ 無基礎寶可夢'); }
  else clearAlert('alertMulligan');
  renderAll();
}

function endTurn(){
  turn++;
  supporterUsedThisTurn=false;
  [activeSlot,...benchSlots].filter(Boolean).forEach(p=>{
    if(p.status.includes('poison')){ p.hp=Math.max(0,p.hp-10); addLog(`🟣 ${p.name} 中毒 -10`); }
    if(p.status.includes('burn')){ p.hp=Math.max(0,p.hp-20); addLog(`🔴 ${p.name} 灼傷 -20`); }
  });
  drawOneCard();
  addLog(`───── 第 ${turn} 回合開始 ─────`);
  renderAll();
}

function drawOneCard(){
  if(!drawPile.length){ addLog('❌ 牌庫已空！'); return; }
  const card=drawPile.pop(); hand.push(card);
  if(turn>0) addLog(`📥 抽到【${card.name}】`);
  renderAll();
}
function drawOne(){ drawOneCard(); }

function drawN(n){
  let drew=0;
  for(let i=0;i<n&&drawPile.length;i++){ hand.push(drawPile.pop()); drew++; }
  addLog(`📥 抽了 ${drew} 張牌`); renderAll();
}

function knockOut(p){
  addLog(`💀 ${p.name} 倒下！取一張獎賞卡`);
  if(activeSlot===p) activeSlot=null;
  else benchSlots=benchSlots.filter(b=>b!==p);
  discard.push(p);
  if(prizes.length){ hand.push(prizes.pop()); addLog(`🏆 取得獎賞卡！`); }
  renderAll();
}

// ════ PLACE POKEMON ════
function promptPlaceActive(){
  const pokesInHand=hand.map((c,i)=>({...c,_idx:i})).filter(c=>c.cardType==='基礎');
  if(!pokesInHand.length){ alert('手牌中沒有基礎寶可夢'); return; }
  showSelectModal('選擇放到戰鬥場的寶可夢',pokesInHand,1,sel=>{
    const card=sel[0]; const idx=hand.findIndex((_,i)=>i===card._idx);
    hand.splice(idx,1);
    const maxHp=parseInt(card.hp)||100;
    activeSlot={...card,hp:maxHp,maxHp,energy:[],status:[],tool:null};
    addLog(`⚔️ ${card.name} 上場（戰鬥場）`); closeModal(); renderAll();
  });
}
function promptPlaceBench(){
  if(benchSlots.length>=5){ alert('備戰區已滿'); return; }
  const pokesInHand=hand.map((c,i)=>({...c,_idx:i})).filter(c=>c.cardType==='基礎');
  if(!pokesInHand.length){ alert('手牌中沒有基礎寶可夢'); return; }
  showSelectModal('選擇放到備戰區的寶可夢',pokesInHand,1,sel=>{
    const card=sel[0]; const idx=hand.findIndex((_,i)=>i===card._idx);
    hand.splice(idx,1);
    const maxHp=parseInt(card.hp)||100;
    benchSlots.push({...card,hp:maxHp,maxHp,energy:[],status:[],tool:null});
    addLog(`🪑 ${card.name} 放到備戰區`); closeModal(); renderAll();
  });
}

// ════ CLICK POKEMON ON FIELD ════
function clickPoke(zone,idx){
  const p=zone==='active'?activeSlot:benchSlots[idx];
  if(!p) return;
  const hpPct=p.maxHp>0?Math.round(p.hp/p.maxHp*100):0;
  let body=`<div class="card-effect-box">`;
  if(p.imageUrl) body+=`<img src="${p.imageUrl}" style="width:56px;height:78px;object-fit:cover;border-radius:5px;float:left;margin-right:8px">`;
  body+=`<div style="font-weight:700;font-size:.88rem;color:var(--accent2)">${esc(p.name)}</div>`;
  body+=`<div style="font-size:.7rem;color:var(--muted)">${p.cardType} ${p.types?'· '+p.types:''}</div>`;
  body+=`<div style="font-size:.7rem;color:var(--muted)">HP ${p.hp}/${p.maxHp} (${hpPct}%)</div>`;
  body+=`<div style="clear:both"></div></div>`;

  // HP
  body+=`<div style="margin:8px 0 4px;font-size:.73rem;color:var(--muted)">⚕ HP 調整</div>`;
  body+=`<div style="display:flex;gap:5px;flex-wrap:wrap">`;
  [[-10,'⬇-10'],[-30,'⬇-30'],[-50,'⬇-50'],[10,'⬆+10'],[30,'⬆+30']].forEach(([v,lbl])=>{
    body+=`<button class="btn btn-sm btn-secondary" onclick="changeHp('${zone}',${idx},${v})">${lbl}</button>`;
  });
  body+=`<button class="btn btn-sm btn-green" onclick="changeHp('${zone}',${idx},999)">回滿</button>`;
  body+=`</div>`;

  // 狀態
  body+=`<div style="margin:8px 0 4px;font-size:.73rem;color:var(--muted)">🎭 狀態異常</div><div class="status-toggles">`;
  [['poison','🟣中毒'],['burn','🔴灼傷'],['sleep','💤睡眠'],['paralyze','⚡麻痺'],['confuse','🌀混亂']].forEach(([k,lbl])=>{
    const on=p.status.includes(k);
    body+=`<div class="stoggle ${k} ${on?'on':''}" onclick="toggleStatus('${zone}',${idx},'${k}')">${lbl}</div>`;
  });
  body+=`</div>`;

  // 能量
  body+=`<div style="margin:8px 0 4px;font-size:.73rem;color:var(--muted)">⚡ 能量（${p.energy.length}個）</div>`;
  body+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px">`;
  ['火','水','草','雷','超','鬥','惡','鋼','龍','無'].forEach(t=>{
    body+=`<button class="btn btn-sm btn-secondary" onclick="addEnergy('${zone}',${idx},'${t}')">${t}</button>`;
  });
  body+=`</div>`;
  if(p.energy.length) body+=`<button class="btn btn-sm btn-secondary" onclick="removeEnergy('${zone}',${idx})">移除最後一個能量</button>`;

  // 特性
  if(p.abilities){
    body+=`<div class="card-effect-box" style="margin-top:8px"><div class="ability-name">◆ 特性</div><div style="font-size:.7rem;line-height:1.7">${esc(p.abilities)}</div>`;
    if(p.abilities.includes('逃跑抽出')){
      body+=`<button class="btn btn-sm btn-green" style="margin-top:5px" onclick="doEscape3('${zone}',${idx})">▶ 發動特性（抽3張洗回）</button>`;
    }
    if(p.abilities.includes('閃焰魔法')){
      body+=`<button class="btn btn-sm btn-green" style="margin-top:5px" onclick="doFlameAbility('${zone}',${idx})">▶ 發動特性（丟火能量抽到7張）</button>`;
    }
    if(p.abilities.includes('交易')){
      body+=`<button class="btn btn-sm btn-green" style="margin-top:5px" onclick="doTradeAbility()">▶ 發動特性（丟1牌抽2張）</button>`;
    }
    body+=`</div>`;
  }

  // 招式
  if(p.attacks){
    body+=`<div class="card-effect-box" style="margin-top:6px"><div class="ability-name" style="color:var(--accent)">⚔️ 招式/效果</div><div style="font-size:.7rem;line-height:1.7">${esc(p.attacks)}</div></div>`;
  }

  const actions=[];
  if(zone==='bench') actions.push(`<button class="btn btn-sm btn-primary" onclick="switchToActive(${idx})">換上戰鬥場</button>`);
  if(zone==='active'&&benchSlots.length) actions.push(`<button class="btn btn-sm btn-secondary" onclick="retreatActive()">撤退</button>`);
  actions.push(`<button class="btn btn-sm btn-secondary" onclick="sendToDiscard('${zone}',${idx})">放入棄牌區</button>`);
  actions.push(`<button class="btn btn-sm btn-secondary" onclick="closeModal()">關閉</button>`);
  showModal(esc(p.name),body,actions.join(''));
}

function changeHp(zone,idx,val){
  const p=zone==='active'?activeSlot:benchSlots[idx]; if(!p) return;
  if(val===999){ p.hp=p.maxHp; addLog(`💊 ${p.name} 回滿 ${p.maxHp}`); }
  else{ p.hp=Math.max(0,Math.min(p.maxHp,p.hp+val)); addLog(`${val<0?'💢':'💚'} ${p.name} HP${val>0?'+':''}${val} → ${p.hp}/${p.maxHp}`); }
  if(p.hp===0){ closeModal(); knockOut(p); } else renderAll();
}
function toggleStatus(zone,idx,k){
  const p=zone==='active'?activeSlot:benchSlots[idx]; if(!p) return;
  const i=p.status.indexOf(k);
  if(i>=0) p.status.splice(i,1); else p.status.push(k);
  addLog(`${p.status.includes(k)?'➕':'➖'} ${p.name} ${k}`);
  closeModal(); clickPoke(zone,idx);
}
function addEnergy(zone,idx,type){
  const p=zone==='active'?activeSlot:benchSlots[idx]; if(!p) return;
  p.energy.push(type); addLog(`⚡ ${p.name} +【${type}】能量`);
  closeModal(); clickPoke(zone,idx);
}
function removeEnergy(zone,idx){
  const p=zone==='active'?activeSlot:benchSlots[idx]; if(!p||!p.energy.length) return;
  const r=p.energy.pop(); addLog(`🗑 ${p.name} 移除【${r}】能量`);
  closeModal(); clickPoke(zone,idx);
}
function switchToActive(benchIdx){
  if(!activeSlot){ activeSlot=benchSlots.splice(benchIdx,1)[0]; addLog(`⚔️ ${activeSlot.name} 換上戰鬥場`); closeModal(); renderAll(); return; }
  const tmp=activeSlot; activeSlot=benchSlots[benchIdx]; benchSlots[benchIdx]=tmp;
  addLog(`🔄 換場：${activeSlot.name} ↔ ${tmp.name}`); closeModal(); renderAll();
}
function retreatActive(){
  if(!activeSlot||!benchSlots.length) return;
  showSelectModal('選擇換上的備戰寶可夢',benchSlots.map((b,i)=>({...b,_idx:i})),1,sel=>{
    const bi=sel[0]._idx; const tmp=activeSlot; activeSlot=benchSlots[bi]; benchSlots[bi]=tmp;
    addLog(`🔄 撤退：${tmp.name} ↔ ${activeSlot.name}`); closeModal(); renderAll();
  });
}
function sendToDiscard(zone,idx){
  const p=zone==='active'?activeSlot:benchSlots[idx]; if(!p) return;
  if(zone==='active') activeSlot=null; else benchSlots.splice(idx,1);
  discard.push(p); addLog(`🗑 ${p.name} → 棄牌區`); closeModal(); renderAll();
}

// ════ ABILITY EFFECTS ════
function doEscape3(zone,idx){
  closeModal();
  const p=zone==='active'?activeSlot:benchSlots[idx];
  drawN(3);
  if(p){ if(zone==='active') activeSlot=null; else benchSlots.splice(idx,1); drawPile.push(p); shuffle(drawPile); }
  addLog(`🌀 逃跑抽出：抽3張，${p?.name}洗回牌庫`); renderAll();
}
function doFlameAbility(zone,idx){
  closeModal();
  const fireIdx=hand.findIndex(c=>c.name.includes('火】能量'));
  if(fireIdx<0){ alert('手牌中沒有火能量'); return; }
  discard.push(hand.splice(fireIdx,1)[0]);
  const need=Math.max(0,7-hand.length);
  for(let i=0;i<need&&drawPile.length;i++) hand.push(drawPile.pop());
  addLog(`🔥 閃焰魔法：丟火能量，抽${need}張到手牌7張`); renderAll();
}
function doTradeAbility(){
  closeModal();
  showSelectModal('選擇要丟棄的手牌',hand.map((c,i)=>({...c,_idx:i})),1,sel=>{
    discard.push(hand.splice(sel[0]._idx,1)[0]);
    for(let i=0;i<2&&drawPile.length;i++) hand.push(drawPile.pop());
    addLog(`🔄 交易：丟1張手牌，抽2張`); closeModal(); renderAll();
  });
}

function showPokeHandModal(c,idx){
  const actions=[];
  if(c.cardType==='基礎'){
    actions.push(`<button class="btn btn-sm btn-primary" onclick="placeFromHand(${idx},'active')">戰鬥場</button>`);
    actions.push(`<button class="btn btn-sm btn-blue" onclick="placeFromHand(${idx},'bench')">備戰區</button>`);
  }
  if(c.cardType==='1階進化'||c.cardType==='2階進化'){
    actions.push(`<button class="btn btn-sm btn-purple" onclick="evolveFromHand(${idx})">進化</button>`);

  // 火狐狸呼朋引伴
  if(c.attacks&&c.attacks.includes('呼朋引伴')){
    actions.push(`<button class="btn btn-sm btn-green" onclick="doCallFriends(${idx})">▶ 呼朋引伴</button>`);
  }

// ════ HAND ACTIONS ════
function placeFromHand(idx,zone){
  const c=hand.splice(idx,1)[0]; const maxHp=parseInt(c.hp)||100;
  const poke={...c,hp:maxHp,maxHp,energy:[],status:[],tool:null};
  if(zone==='active'){ activeSlot=poke; addLog(`⚔️ ${c.name} 上場`); }
  else{ if(benchSlots.length>=5){ hand.splice(idx,0,c); alert('備戰區已滿'); return; } benchSlots.push(poke); addLog(`🪑 ${c.name} → 備戰區`); }
  closeModal(); renderAll();
}
function evolveFromHand(idx){
  const c=hand[idx];
  const allPoke=[...(activeSlot?[{...activeSlot,_zone:'active',_bidx:-1}]:[]),...benchSlots.map((p,i)=>({...p,_zone:'bench',_bidx:i}))];
  if(!allPoke.length){ alert('場上沒有寶可夢'); return; }
  showSelectModal('選擇要進化的寶可夢',allPoke,1,sel=>{
    const t=sel[0]; const p=t._zone==='active'?activeSlot:benchSlots[t._bidx];
    if(p){
      const newHp=parseInt(c.hp)||p.maxHp;
      p.name=c.name; p.imageUrl=c.imageUrl; p.cardType=c.cardType;
      p.abilities=c.abilities; p.attacks=c.attacks; p.maxHp=newHp; p.hp=Math.min(p.hp,newHp);
      hand.splice(idx,1); addLog(`🔆 進化為 ${c.name}`);
    }
    closeModal(); renderAll();
  });
}
function discardFromHand(idx){ const c=hand.splice(idx,1)[0]; discard.push(c); addLog(`🗑 棄牌：${c.name}`); closeModal(); renderAll(); }
function genericUseCard(idx){
  const c=hand.splice(idx,1)[0]; discard.push(c);
  if(c.cardType==='支援者卡') supporterUsedThisTurn=true;
  addLog(`✅ 使用【${c.name}】（手動執行效果）`); closeModal(); renderAll();
}
function attachEnergyFromHand(idx){
  const c=hand[idx];
  const pokes=[...(activeSlot?[{...activeSlot,_zone:'active',_bidx:-1}]:[]),...benchSlots.map((p,i)=>({...p,_zone:'bench',_bidx:i}))];
  showSelectModal('選擇附加能量的寶可夢',pokes,1,sel=>{
    const t=sel[0]; const p=t._zone==='active'?activeSlot:benchSlots[t._bidx];
    if(p){
      const energyType=c.types||c.name.match(/【(.+)】/)?.[1]||'無';
      p.energy.push(energyType); hand.splice(idx,1);
      addLog(`⚡ ${p.name} 附加【${energyType}】能量`);
    }
    closeModal(); renderAll();
  });
}
function placeStadium(idx){
  const c=hand.splice(idx,1)[0];
  if(stadium) discard.push(stadium);
  stadium=c; addLog(`🏟 競技場：${c.name}`); closeModal(); renderAll();
}
function removeStadium(){
  if(!stadium) return;
  const extraBtns = buildEffectButtons(stadium, -1, false);
  showModal(esc(stadium.name), cardInfoHtml(stadium),
    (extraBtns ? extraBtns + ' ' : '') +
    `<button class="btn btn-sm btn-secondary" onclick="doRemoveStadium()">移除競技場</button><button class="btn btn-sm btn-secondary" onclick="closeModal()">關閉</button>`
  );
}
function doRemoveStadium(){ if(stadium){ discard.push(stadium); addLog(`🗑 移除競技場：${stadium.name}`); stadium=null; } closeModal(); renderAll(); }

// ════ SUPPORTER EFFECTS ════
function doLillie(idx,prizes6){
  const n=prizes6?8:6;
  hand.splice(idx,1).concat(hand.splice(0)).forEach(c=>drawPile.push(c)); hand=[]; shuffle(drawPile);
  for(let i=0;i<n&&drawPile.length;i++) hand.push(drawPile.pop());
  supporterUsedThisTurn=true; addLog(`🌸 莉莉艾的決意：手牌洗回，抽${n}張`); closeModal(); renderAll();
}
function doJudge(idx){
  hand.splice(idx,1); hand.forEach(c=>drawPile.push(c)); hand=[]; shuffle(drawPile);
  for(let i=0;i<4&&drawPile.length;i++) hand.push(drawPile.pop());
  supporterUsedThisTurn=true; addLog(`⚖️ 裁判：手牌洗回，抽4張`); closeModal(); renderAll();
}
function doBlower(idx){
  hand.splice(idx,1);
  const fires=drawPile.filter(c=>c.name.includes('火】能量'));
  fires.slice(0,7).forEach(c=>{ const i=drawPile.indexOf(c); if(i>=0){ drawPile.splice(i,1); hand.push(c); } });
  shuffle(drawPile); supporterUsedThisTurn=true;
  addLog(`🔥 吹火人：從牌庫取${Math.min(fires.length,7)}張火能量`); closeModal(); renderAll();
}
function doCipher(idx){
  hand.splice(idx,1); supporterUsedThisTurn=true;
  const opts=drawPile.map((c,i)=>({...c,_pidx:i}));
  showSelectModal('從牌庫選2張放到牌庫上方',opts,2,sel=>{
    const chosen=sel.map(s=>{ const i=drawPile.findIndex(c=>c===s||c.name===s.name); if(i>=0) return drawPile.splice(i,1)[0]; return null; }).filter(Boolean);
    chosen.reverse().forEach(c=>drawPile.push(c));
    addLog(`🔍 暗碼迷的解讀：選2張放牌庫上方`); closeModal(); renderAll();
  });
}
function doKiku(idx){
  hand.splice(idx,1); supporterUsedThisTurn=true;
  const basic=drawPile.find(c=>c.cardType==='基礎');
  const s1=drawPile.find(c=>c.cardType==='1階進化');
  const s2=drawPile.find(c=>c.cardType==='2階進化');
  [basic,s1,s2].filter(Boolean).forEach(c=>{ const i=drawPile.indexOf(c); if(i>=0){ drawPile.splice(i,1); hand.push(c); } });
  shuffle(drawPile); addLog(`✨ 小光：從牌庫取基礎/1階/2階各1張`); closeModal(); renderAll();
}

// ════ ITEM EFFECTS ════
function doUseItem(idx,type){
  closeModal();
  const c=hand[idx];
  if(type==='premier'){
    if(hand.length<3){ alert('手牌不足（需要至少3張，含高級球）'); return; }
    const opts=hand.map((h,i)=>({...h,_idx:i})).filter((_,i)=>i!==idx);
    showSelectModal('選2張手牌丟棄',opts,2,sel=>{
      sel.sort((a,b)=>b._idx-a._idx).forEach(s=>{ discard.push(hand.splice(s._idx,1)[0]); });
      const bi=hand.findIndex(h=>h.name==='高級球'); if(bi>=0) discard.push(hand.splice(bi,1)[0]);
      const pokes=drawPile.filter(h=>POKE_T.has(h.cardType));
      showSelectModal('從牌庫選1張寶可夢',pokes,1,sel2=>{
        const i=drawPile.findIndex(h=>h.name===sel2[0].name&&POKE_T.has(h.cardType));
        if(i>=0){ hand.push(drawPile.splice(i,1)[0]); shuffle(drawPile); }
        addLog(`🎱 高級球：取【${sel2[0].name}】`); closeModal(); renderAll();
      });
    }); return;
  }
  discard.push(hand.splice(idx,1)[0]);
  if(type==='buddy'){
    const basics=drawPile.filter(h=>h.cardType==='基礎'&&parseInt(h.hp||0)<=70);
    showSelectModal('選最多2張HP70以下基礎寶可夢放備戰區',basics,2,sel=>{
      sel.forEach(s=>{ const i=drawPile.findIndex(h=>h.name===s.name&&h.cardType==='基礎'); if(i>=0&&benchSlots.length<5){ const card=drawPile.splice(i,1)[0]; const mh=parseInt(card.hp)||100; benchSlots.push({...card,hp:mh,maxHp:mh,energy:[],status:[],tool:null}); } });
      shuffle(drawPile); addLog(`🤝 好友寶芬：放${sel.length}隻到備戰區`); closeModal(); renderAll();
    }); return;
  }
  if(type==='pad'){
    const pokes=drawPile.filter(h=>POKE_T.has(h.cardType)&&!h.name.includes('ex'));
    showSelectModal('從牌庫選1張非ex寶可夢',pokes,1,sel=>{
      const i=drawPile.findIndex(h=>h.name===sel[0].name); if(i>=0){ hand.push(drawPile.splice(i,1)[0]); shuffle(drawPile); }
      addLog(`📱 寶可平板：取【${sel[0].name}】`); closeModal(); renderAll();
    }); return;
  }
  if(type==='signal'){
    const targets=drawPile.filter(h=>h.name.includes('超級')&&h.name.includes('ex'));
    if(!targets.length){ addLog('牌庫沒有超級ex'); renderAll(); return; }
    showSelectModal('從牌庫選1張超級ex',targets,1,sel=>{
      const i=drawPile.findIndex(h=>h.name===sel[0].name); if(i>=0){ hand.push(drawPile.splice(i,1)[0]); shuffle(drawPile); }
      addLog(`📡 超級信號：取【${sel[0].name}】`); closeModal(); renderAll();
    }); return;
  }
  if(type==='ereturn2'||type==='ereturn5'){
    const max=type==='ereturn2'?2:5; const dest=type==='ereturn2'?'hand':'deck';
    const energies=discard.filter(h=>ENERGY_T.has(h.cardType));
    if(!energies.length){ addLog('棄牌區沒有能量'); renderAll(); return; }
    showSelectModal(`從棄牌區選最多${max}張基本能量`,energies,max,sel=>{
      sel.forEach(s=>{ const i=discard.findIndex(h=>h.name===s.name&&ENERGY_T.has(h.cardType)); if(i>=0){ const card=discard.splice(i,1)[0]; if(dest==='hand') hand.push(card); else{ drawPile.push(card); shuffle(drawPile); } } });
      addLog(`♻️ 能量回收${max===5?'器':''}：${sel.length}張能量→${dest==='hand'?'手牌':'牌庫'}`); closeModal(); renderAll();
    }); return;
  }
  if(type==='candy'){
    const s2=hand.map((h,i)=>({...h,_idx:i})).filter(h=>h.cardType==='2階進化');
    if(!s2.length){ addLog('手牌沒有2階進化'); renderAll(); return; }
    showSelectModal('選2階進化卡',s2,1,sel=>{
      const evo=sel[0];
      const allPoke=[...(activeSlot?[{...activeSlot,_zone:'active',_bidx:-1}]:[]),...benchSlots.map((p,i)=>({...p,_zone:'bench',_bidx:i}))];
      showSelectModal('選擇要進化的寶可夢',allPoke,1,sel2=>{
        const t=sel2[0]; const p=t._zone==='active'?activeSlot:benchSlots[t._bidx];
        if(p){ const ei=hand.findIndex(h=>h.name===evo.name&&h.cardType==='2階進化'); if(ei>=0) discard.push(hand.splice(ei,1)[0]); const nh=parseInt(evo.hp)||p.maxHp; p.name=evo.name; p.imageUrl=evo.imageUrl; p.cardType=evo.cardType; p.abilities=evo.abilities; p.attacks=evo.attacks; p.maxHp=nh; p.hp=Math.min(p.hp,nh); addLog(`🍬 神奇糖果：進化為${evo.name}`); }
        closeModal(); renderAll();
      });
    }); return;
  }
  if(type==='stretcher'){
    // 夜間擔架：寶可夢或基本能量加手牌
    doDiscardToHandPokeOrEnergy(); return;
  }
  renderAll();
}

// ════ DECK / DISCARD VIEW ════
function showDiscard(){
  if(!discard.length){ alert('棄牌區是空的'); return; }
  let body='<div class="select-list">';
  discard.slice().reverse().forEach(c=>{ body+=`<div class="select-item"><div class="si-name">${esc(c.name)}<div style="font-size:.63rem;color:var(--muted)">${c.cardType}</div></div></div>`; });
  body+='</div>';
  showModal(`棄牌區（${discard.length}張）`,body,'<button class="btn btn-sm btn-secondary" onclick="closeModal()">關閉</button>');
}
function showDeckContents(){
  if(!drawPile.length){ alert('牌庫是空的'); return; }
  const counts={};
  drawPile.forEach(c=>{ counts[c.name]=(counts[c.name]||0)+1; });
  let body=`<div style="font-size:.7rem;color:var(--muted);margin-bottom:6px">剩餘 ${drawPile.length} 張</div><div class="select-list">`;
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([name,cnt])=>{
    body+=`<div class="select-item"><div class="si-name">${esc(name)}</div><div style="color:var(--accent2);font-weight:700">×${cnt}</div></div>`;
  });
  body+='</div>';
  showModal('牌庫內容',body,'<button class="btn btn-sm btn-secondary" onclick="closeModal()">關閉</button>');

// ════ RENDER ════
function renderAll(){
  renderPrizes(); renderDeckDiscard(); renderStadium(); renderActive(); renderBench(); renderHand(); renderTurnBadge();
}
function renderPrizes(){
  const row=document.getElementById('prizesRow'); row.innerHTML='';
  for(let i=0;i<6;i++){
    const taken=i>=prizes.length; const div=document.createElement('div');
    div.className='prize-card'+(taken?' taken':''); div.textContent=taken?'✓':'？'; row.appendChild(div);
  }
}
function renderDeckDiscard(){
  document.getElementById('deckNum').textContent=drawPile.length;
  document.getElementById('discardNum').textContent=discard.length;
  const top=document.getElementById('discardTop');
  if(discard.length){ const last=discard[discard.length-1]; if(last.imageUrl){ top.innerHTML=`<img class="discard-top" src="${last.imageUrl}" onerror="this.style.display='none'">`; } else top.textContent=last.name.slice(0,4); }
  else top.textContent='棄牌';
}
function renderStadium(){
  const slot=document.getElementById('stadiumSlot'); const lbl=document.getElementById('stadiumName');
  if(stadium){ if(stadium.imageUrl) slot.innerHTML=`<img src="${stadium.imageUrl}" style="width:52px;height:37px;object-fit:cover;border-radius:4px">`; else slot.textContent=stadium.name; lbl.textContent=stadium.name; }
  else{ slot.textContent='空'; lbl.textContent=''; }
}
function renderActive(){
  const el=document.getElementById('activeSlot');
  if(!activeSlot){ el.className='poke-slot empty-slot'; el.innerHTML='＋<br>放置'; el.onclick=promptPlaceActive; return; }
  el.className='poke-slot active-poke'; el.onclick=()=>clickPoke('active',-1); el.innerHTML=pokeSlotHTML(activeSlot);
}
function renderBench(){
  const container=document.getElementById('benchSlots'); container.innerHTML='';
  benchSlots.forEach((p,i)=>{ const div=document.createElement('div'); div.className='poke-slot'; div.innerHTML=pokeSlotHTML(p); div.onclick=()=>clickPoke('bench',i); container.appendChild(div); });
  if(benchSlots.length<5){ const add=document.createElement('div'); add.className='poke-slot empty-slot'; add.innerHTML='＋<br>備戰'; add.onclick=promptPlaceBench; container.appendChild(add); }
}
function pokeSlotHTML(p){
  const pct=p.maxHp>0?p.hp/p.maxHp*100:100;
  const col=pct>50?'var(--green)':pct>25?'var(--accent2)':'var(--accent)';
  let h='';
  if(p.imageUrl){ h+=`<img class="poke-img" src="${p.imageUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`; h+=`<div class="poke-img-err" style="display:none">${esc(p.name)}</div>`; }
  else h+=`<div class="poke-img-err">${esc(p.name)}</div>`;
  h+=`<div class="poke-name">${esc(p.name.length>8?p.name.slice(0,7)+'…':p.name)}</div>`;
  h+=`<div class="poke-hp-bar"><div class="poke-hp-fill" style="width:${pct}%;background:${col}"></div></div>`;
  h+=`<div class="poke-hp-text">HP ${p.hp}/${p.maxHp}</div>`;
  if(p.energy.length){ h+=`<div class="poke-energy">`; p.energy.forEach(e=>{ h+=`<div class="energy-pip ep-${e}">${e[0]}</div>`; }); h+=`</div>`; }
  if(p.status.length){ const lbl={poison:'毒',burn:'燒',sleep:'眠',paralyze:'麻',confuse:'亂'}; h+=`<div class="status-badges">`; p.status.forEach(s=>{ h+=`<span class="sbadge sb-${s}">${lbl[s]||s}</span>`; }); h+=`</div>`; }
  return h;
}
function renderHand(){
  const container=document.getElementById('handCards');
  document.getElementById('handCountLbl').textContent=hand.length+' 張';
  if(!hand.length){ container.innerHTML='<span style="color:var(--muted);font-size:.74rem">手牌為空</span>'; return; }
  container.innerHTML=hand.map((c,i)=>{

}

// ════ PROB ════
function buildProbTable(){
  const N=deckList.reduce((s,c)=>s+c.count,0);
  document.getElementById('probBody').innerHTML=deckList.map(c=>{
    const p1=(hyperAtLeast(N,c.count,7,1)*100).toFixed(1);
    const p2=c.count>=2?(hyperAtLeast(N,c.count,7,2)*100).toFixed(1):null;
    return `<tr><td>${esc(c.name)}</td><td style="color:var(--muted)">${c.count}</td><td>${p1}%<span class="pbar-wrap"><span class="pbar" style="width:${p1}%"></span></span></td><td>${p2!==null?p2+'%':'-'}</td></tr>`;
  }).join('');
}
function hyperAtLeast(N,K,n,k){ let p=0;for(let i=0;i<k;i++) p+=hyperExact(N,K,n,i);return Math.max(0,Math.min(1,1-p)); }
function hyperExact(N,K,n,k){ return comb(K,k)*comb(N-K,n-k)/comb(N,n); }
function comb(n,k){ if(k<0||k>n)return 0;if(k===0||k===n)return 1;k=Math.min(k,n-k);let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return r; }

// 判斷卡牌應該顯示哪些操作按鈕
function detectEffects(c) {
  const text = (c.abilities||'') + ' ' + (c.attacks||'');
  const effects = [];

  // ① 從手牌附能量到場上寶可夢
  if (/從自己的手牌選擇.*能量.*附/.test(text) || /手牌.*能量.*附於/.test(text)) {
    effects.push('attachEnergyFromHandToField');
  }

  // ② 從棄牌區取任意卡到手牌（寶可夢或能量）
  if (/從自己的棄牌區選擇.*寶可夢卡或者基本能量/.test(text)) {
    effects.push('discardToHandPokeOrEnergy');
  }
  // 從棄牌區取寶可夢到牌庫
  if (/棄牌區選擇.*寶可夢卡.*放回牌庫/.test(text)) {
    effects.push('discardPokeToDeck');
  }

  // ③ 看牌庫頂N張，選X張加手牌/備戰，其餘洗回
  const topDeckMatch = text.match(/查看自己的牌庫上方(\d+)張/);
  if (topDeckMatch) {
    const n = parseInt(topDeckMatch[1]);
    if (/放置於備戰區/.test(text)) effects.push(`topDeckToBench:${n}`);
    else if (/附於自己的寶可夢/.test(text)) effects.push(`topDeckAttachEnergy:${n}`);
    else effects.push(`topDeckToHand:${n}`);
  }

  // ④ 從手牌丟棄X張才可使用
  if (/必須將自己的(\d+)張手牌丟棄才可使用/.test(text)) {
    const m = text.match(/必須將自己的(\d+)張手牌丟棄/);
    effects.push(`discardHandFirst:${m?m[1]:1}`);
  }
  if (/必須將自己的1張手牌丟棄才可使用/.test(text)) {
    effects.push('discardHandFirst:1');
  }

  // ⑤ 場上寶可夢換場（自己操作）
  if (/將這隻寶可夢與備戰寶可夢互換/.test(text)) {
    effects.push('selfSwitch');
  }
  if (/將自己的戰鬥寶可夢與備戰寶可夢互換/.test(text)) {
    effects.push('activeSwitch');
  }

  // ⑥ 選手牌放牌庫頂
  if (/選擇1張自己的手牌.*放回牌庫上方/.test(text) || /手牌.*放回牌庫上方/.test(text)) {
    effects.push('handTopDeck');
  }

  // 手牌全部丟棄（青木）
  if (/將自己的手牌全部丟棄/.test(text)) {
    effects.push('discardAllHand');
  }

  // 抽到手牌滿N張（艾莉絲）
  if (/抽卡直到自己的手牌滿(\d+)張/.test(text)) {
    const m = text.match(/抽卡直到自己的手牌滿(\d+)張/);
    effects.push(`drawUntil:${m?m[1]:6}`);
  }

  // 能量撢子類：從牌庫頂N張選能量加手牌
  if (/從牌庫選擇.*能量.*加入手牌/.test(text) || /從牌庫選擇.*能量.*手牌/.test(text)) {
    effects.push('deckEnergyToHand');
  }

  return effects;
}

// 根據效果列表生成操作按鈕
function buildEffectButtons(c, idx, isFieldPoke) {
  const effects = detectEffects(c);
  if (!effects.length) return '';
  
  let btns = '';
  effects.forEach(eff => {
    const [type, param] = eff.split(':');
    switch(type) {
      case 'attachEnergyFromHandToField':
        btns += `<button class="btn btn-sm btn-green" onclick="doAttachEnergyFromHandToField()">▶ 從手牌附能量到寶可夢</button>`;
        break;
      case 'discardToHandPokeOrEnergy':
        btns += `<button class="btn btn-sm btn-green" onclick="doDiscardToHandPokeOrEnergy()">▶ 從棄牌取寶可夢或能量</button>`;
        break;
      case 'discardPokeToDeck':
        btns += `<button class="btn btn-sm btn-green" onclick="doDiscardPokeToDeck()">▶ 從棄牌取寶可夢到牌庫</button>`;
        break;
      case 'topDeckToBench':
        btns += `<button class="btn btn-sm btn-green" onclick="doTopDeckToBench(${param})">▶ 看牌庫頂${param}張，選寶可夢放備戰</button>`;
        break;
      case 'topDeckToHand':
        btns += `<button class="btn btn-sm btn-green" onclick="doTopDeckToHand(${param})">▶ 看牌庫頂${param}張，選卡加手牌</button>`;
        break;
      case 'topDeckAttachEnergy':
        btns += `<button class="btn btn-sm btn-green" onclick="doTopDeckAttachEnergy(${param})">▶ 看牌庫頂${param}張，選能量附上</button>`;
        break;
      case 'discardHandFirst':
        btns += `<button class="btn btn-sm btn-green" onclick="doDiscardHandFirst(${param}, ${idx})">▶ 丟${param}張手牌後使用</button>`;
        break;
      case 'selfSwitch':
        if (isFieldPoke) btns += `<button class="btn btn-sm btn-blue" onclick="doSelfSwitch()">▶ 與備戰寶可夢互換</button>`;
        break;
      case 'activeSwitch':
        btns += `<button class="btn btn-sm btn-blue" onclick="doActiveSwitchModal()">▶ 戰鬥寶可夢換場</button>`;
        break;
      case 'handTopDeck':
        btns += `<button class="btn btn-sm btn-blue" onclick="doHandTopDeck()">▶ 選1張手牌放牌庫頂</button>`;
        break;
      case 'discardAllHand':
        btns += `<button class="btn btn-sm btn-green" onclick="doDiscardAllHand(${idx})">▶ 手牌全部丟棄後搜尋</button>`;
        break;
      case 'drawUntil':
        btns += `<button class="btn btn-sm btn-green" onclick="doDrawUntil(${param}, ${idx})">▶ 抽牌到手牌滿${param}張</button>`;
        break;
      case 'deckEnergyToHand':
        btns += `<button class="btn btn-sm btn-green" onclick="doDeckEnergyToHand()">▶ 從牌庫選能量加手牌</button>`;
        break;
    }
  });
  return btns;
}

// ════ 6種通用效果實作 ════

// ① 從手牌選能量附到場上寶可夢（炎武王特性）
function doAttachEnergyFromHandToField() {
  const energyInHand = hand.map((c,i) => ({...c,_idx:i})).filter(c => ENERGY_T.has(c.cardType));
  if (!energyInHand.length) { alert('手牌中沒有能量卡'); return; }
  const pokes = [...(activeSlot?[{...activeSlot,_zone:'active',_bidx:-1}]:[]),...benchSlots.map((p,i)=>({...p,_zone:'bench',_bidx:i}))];
  if (!pokes.length) { alert('場上沒有寶可夢'); return; }
  showSelectModal('選擇要附加的能量卡', energyInHand, 1, selE => {
    showSelectModal('選擇要附加到的寶可夢', pokes, 1, selP => {
      const eCard = selE[0];
      const target = selP[0];
      const p = target._zone==='active' ? activeSlot : benchSlots[target._bidx];
      if (p) {
        const eType = eCard.types || eCard.name.match(/【(.+)】/)?.[1] || '無';
        p.energy.push(eType);
        hand.splice(eCard._idx, 1);
        addLog(`⚡ 從手牌附【${eType}】能量到 ${p.name}`);
      }
      closeModal(); renderAll();
    });
  });
}

// ② 從棄牌區選寶可夢或能量加手牌（夜間擔架修正）
function doDiscardToHandPokeOrEnergy() {
  const available = discard.filter(c => POKE_T.has(c.cardType) || ENERGY_T.has(c.cardType));
  if (!available.length) { addLog('棄牌區沒有寶可夢或能量'); return; }
  showSelectModal('從棄牌區選1張寶可夢或能量加手牌', available, 1, sel => {
    const i = discard.findIndex(c => c.name === sel[0].name);
    if (i >= 0) { hand.push(discard.splice(i, 1)[0]); addLog(`♻️ 從棄牌取【${sel[0].name}】到手牌`); }
    closeModal(); renderAll();
  });
}

// 從棄牌區取寶可夢放牌庫（聖灰等）
function doDiscardPokeToDeck() {
  const pokes = discard.filter(c => POKE_T.has(c.cardType));
  if (!pokes.length) { addLog('棄牌區沒有寶可夢'); return; }
  showSelectModal('從棄牌區選最多5張寶可夢放回牌庫', pokes, 5, sel => {
    sel.forEach(s => {
      const i = discard.findIndex(c => c.name === s.name && POKE_T.has(c.cardType));
      if (i >= 0) { drawPile.push(discard.splice(i,1)[0]); }
    });
    shuffle(drawPile);
    addLog(`♻️ ${sel.length}張寶可夢從棄牌放回牌庫`);
    closeModal(); renderAll();
  });
}

// ③ 看牌庫頂N張，選寶可夢放備戰（超級妖火紅狐）
function doTopDeckToBench(n) {
  if (drawPile.length === 0) { addLog('牌庫是空的'); return; }
  const topCards = drawPile.slice(-Math.min(n, drawPile.length)).reverse();
  const pokes = topCards.filter(c => POKE_T.has(c.cardType));
  if (!pokes.length) { 
    addLog(`看牌庫頂${n}張：沒有寶可夢，全部洗回`);
    shuffle(drawPile); renderAll(); return; 
  }
  showSelectModal(`從牌庫頂${n}張中選寶可夢放備戰區（可不選）`, pokes, pokes.length, sel => {
    sel.forEach(s => {
      const i = drawPile.findIndex(c => c.name === s.name && POKE_T.has(c.cardType));
      if (i >= 0 && benchSlots.length < 5) {
        const card = drawPile.splice(i,1)[0];
        const mh = parseInt(card.hp)||100;
        benchSlots.push({...card, hp:mh, maxHp:mh, energy:[], status:[], tool:null});
      }
    });
    shuffle(drawPile);
    addLog(`🔮 看牌庫頂${n}張：放${sel.length}隻寶可夢到備戰區`);
    closeModal(); renderAll();
  });
}

// 看牌庫頂N張，選任意卡加手牌
function doTopDeckToHand(n) {
  if (!drawPile.length) { addLog('牌庫是空的'); return; }
  const topCards = [...drawPile.slice(-Math.min(n, drawPile.length))].reverse();
  showSelectModal(`從牌庫頂${n}張中選任意張加手牌，其餘洗回`, topCards, topCards.length, sel => {
    sel.forEach(s => {
      const i = drawPile.findIndex(c => c.name === s.name);
      if (i >= 0) hand.push(drawPile.splice(i,1)[0]);
    });
    shuffle(drawPile);
    addLog(`👀 看牌庫頂${n}張：選${sel.length}張加手牌`);
    closeModal(); renderAll();
  });
}

// 看牌庫頂N張，選能量附到寶可夢（女服務生）
function doTopDeckAttachEnergy(n) {
  if (!drawPile.length) { addLog('牌庫是空的'); return; }
  const topCards = [...drawPile.slice(-Math.min(n, drawPile.length))].reverse();
  const energies = topCards.filter(c => ENERGY_T.has(c.cardType));
  if (!energies.length) { addLog(`牌庫頂${n}張沒有能量，洗回`); shuffle(drawPile); return; }
  const pokes = [...(activeSlot?[{...activeSlot,_zone:'active',_bidx:-1}]:[]),...benchSlots.map((p,i)=>({...p,_zone:'bench',_bidx:i}))];
  if (!pokes.length) { addLog('場上沒有寶可夢'); return; }
  showSelectModal(`從牌庫頂${n}張選1張能量`, energies, 1, selE => {
    showSelectModal('選擇附加到的寶可夢', pokes, 1, selP => {
      const eCard = selE[0];
      const target = selP[0];
      const p = target._zone==='active' ? activeSlot : benchSlots[target._bidx];
      if (p) {
        const i = drawPile.findIndex(c => c.name === eCard.name && ENERGY_T.has(c.cardType));
        if (i >= 0) {
          const eType = eCard.types || eCard.name.match(/【(.+)】/)?.[1] || '無';
          p.energy.push(eType); drawPile.splice(i,1);
          addLog(`⚡ 從牌庫頂附【${eType}】能量到 ${p.name}`);
        }
      }
      shuffle(drawPile); closeModal(); renderAll();
    });
  });
}

// ④ 丟N張手牌後使用卡牌（松葉、艾莉絲等）
function doDiscardHandFirst(n, cardIdx) {
  if (hand.length <= n) { alert(`手牌不足，需要至少${n+1}張`); return; }
  const opts = hand.map((c,i) => ({...c,_idx:i})).filter((_,i) => i !== cardIdx);
  showSelectModal(`選${n}張手牌丟棄`, opts, n, sel => {
    sel.sort((a,b) => b._idx - a._idx).forEach(s => {
      discard.push(hand.splice(s._idx,1)[0]);
    });
    addLog(`🗑 丟棄${n}張手牌，效果發動`);
    closeModal();
    // 提示玩家繼續操作
    const card = hand[cardIdx > sel.filter(s=>s._idx<cardIdx).length ? cardIdx - sel.filter(s=>s._idx<cardIdx).length : cardIdx];
    if (card) showModal('效果發動', cardInfoHtml(card), `<button class="btn btn-sm btn-green" onclick="genericUseCard(${cardIdx})">✅ 手動執行效果後棄牌</button><button class="btn btn-sm btn-secondary" onclick="closeModal()">關閉</button>`);
  });
}

// ⑤ 自己換場（土龍弟弟招式：自身與備戰互換）
function doSelfSwitch() {
  if (!benchSlots.length) { alert('備戰區沒有寶可夢'); return; }
  showSelectModal('選擇換上的備戰寶可夢', benchSlots.map((b,i) => ({...b,_idx:i})), 1, sel => {
    const bi = sel[0]._idx;
    const tmp = activeSlot; activeSlot = benchSlots[bi]; benchSlots[bi] = tmp;
    addLog(`🔄 換場：${activeSlot.name} ↔ ${tmp.name}`);
    closeModal(); renderAll();
  });
}

// 戰鬥寶可夢換場（AZ的平和、急進開關等）
function doActiveSwitchModal() {
  if (!benchSlots.length) { alert('備戰區沒有寶可夢'); return; }
  showSelectModal('選擇換上的備戰寶可夢', benchSlots.map((b,i) => ({...b,_idx:i})), 1, sel => {
    const bi = sel[0]._idx;
    const tmp = activeSlot; activeSlot = benchSlots[bi]; benchSlots[bi] = tmp;
    // AZ：ex 換入備戰恢復 80HP
    if (tmp && tmp.name.includes('ex')) { tmp.hp = Math.min(tmp.hp + 80, tmp.maxHp); addLog(`💚 ${tmp.name}（ex）換入備戰，恢復80HP`); }
    addLog(`🔄 換場：${activeSlot.name} 上場`);
    closeModal(); renderAll();
  });
}

// ⑥ 選手牌1張放牌庫頂（夜間學院競技場效果）
function doHandTopDeck() {
  if (!hand.length) { alert('手牌是空的'); return; }
  showSelectModal('選1張手牌放到牌庫最上方', hand.map((c,i) => ({...c,_idx:i})), 1, sel => {
    const i = sel[0]._idx;
    drawPile.push(hand.splice(i,1)[0]);
    addLog(`📤 1張手牌放到牌庫頂`);
    closeModal(); renderAll();
  });
}

// 手牌全部丟棄後搜尋（青木的手法）
function doDiscardAllHand(cardIdx) {
  const card = hand[cardIdx];
  hand.forEach((c,i) => { if(i !== cardIdx) discard.push(c); });
  hand = [card]; // 保留青木本身，之後搜尋完再棄
  addLog('🗑 手牌全部丟棄');
  // 從牌庫各選1張寶可夢、支援者、基本能量
  const pokes = drawPile.filter(c => POKE_T.has(c.cardType));
  const supports = drawPile.filter(c => c.cardType === '支援者卡');
  const energies = drawPile.filter(c => ENERGY_T.has(c.cardType));
  showSelectModal('選1張寶可夢', pokes, 1, selP => {
    showSelectModal('選1張支援者', supports, 1, selS => {
      showSelectModal('選1張基本能量', energies, 1, selE => {
        [selP[0], selS[0], selE[0]].filter(Boolean).forEach(s => {
          const i = drawPile.findIndex(c => c.name === s.name);
          if (i >= 0) hand.push(drawPile.splice(i,1)[0]);
        });
        shuffle(drawPile);
        discardFromHand(hand.findIndex(c => c.name === card.name));
        addLog('✅ 青木的手法：取寶可夢、支援者、能量各1張');
        closeModal(); renderAll();
      });
    });
  });
}

// 抽牌到手牌滿N張（艾莉絲）
function doDrawUntil(n, cardIdx) {
  discardFromHand(cardIdx);
  const need = Math.max(0, n - hand.length);
  for (let i = 0; i < need && drawPile.length; i++) hand.push(drawPile.pop());
  addLog(`📥 抽${need}張，手牌滿${n}張`);
  renderAll();
}

// 從牌庫選能量加手牌（通用）
function doDeckEnergyToHand() {
  const energies = drawPile.filter(c => ENERGY_T.has(c.cardType));
  if (!energies.length) { addLog('牌庫沒有能量'); return; }
  showSelectModal('從牌庫選能量加手牌', energies, 7, sel => {
    sel.forEach(s => {
      const i = drawPile.findIndex(c => c.name === s.name && ENERGY_T.has(c.cardType));
      if (i >= 0) hand.push(drawPile.splice(i,1)[0]);
    });
    shuffle(drawPile);
    addLog(`⚡ 從牌庫取${sel.length}張能量到手牌`);
    closeModal(); renderAll();
  });
}

// ════ 競技場效果提示（夜間學院）════
function stadiumActionPrompt() {
  if (!stadium) { alert('場上沒有競技場卡'); return; }
  const effects = detectEffects(stadium);
  if (!effects.length) { showModal(esc(stadium.name), cardInfoHtml(stadium), '<button class="btn btn-sm btn-secondary" onclick="closeModal()">關閉</button>'); return; }
  const btns = buildEffectButtons(stadium, -1, false);
  showModal(esc(stadium.name) + '（發動效果）', cardInfoHtml(stadium), btns + '<button class="btn btn-sm btn-secondary" onclick="closeModal()">關閉</button>');
}


function copyCode(){
  if(!currentDeckCode) return;
  navigator.clipboard?.writeText(currentDeckCode).catch(()=>{});
  const btn=document.querySelector('.copy-btn'); if(btn){ btn.textContent='✅'; setTimeout(()=>btn.textContent='複製',1500); }
}
